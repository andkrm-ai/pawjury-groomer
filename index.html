<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wasteland Groomer — ретро-игра о питомцах пустоши | PawJury</title>
<meta name="description" content="Бесплатная ретро-игра в браузере: восемь контрактов по уходу за питомцами пустоши — вычёсывайте котов и собак, пылесосьте берлогу, контролируйте запах, побеждайте пятна, спасайте диван от шерсти, стачивайте когти и охраняйте ступеньки у кровати. Очки — в общей турнирной таблице.">
<link rel="canonical" href="https://andkrm-ai.github.io/pawjury-groomer/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://andkrm-ai.github.io/pawjury-groomer/">
<meta property="og:site_name" content="PawJury">
<meta property="og:title" content="Wasteland Groomer — ретро-игра о питомцах пустоши">
<meta property="og:description" content="Восемь контрактов в пустоши: грумьте, пылесосьте, контролируйте запах, побеждайте пятна, спасайте диван, стачивайте когти, охраняйте ступеньки. Очки — в общей таблице.">
<meta name="twitter:card" content="summary">
<style>
  :root{
    --bg:#0a0f0a; --panel:#111b12; --panel2:#0d150e;
    --phos:#5dff7e; --phos-dim:#2f7a45; --phos-faint:#1c4027;
    --amber:#ffb54d; --red:#ff5d4d; --ink:#bfffd0;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Courier New",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--mono);
    font-size:14px; line-height:1.45; min-height:100vh;
    background-image:radial-gradient(ellipse at 50% 20%, #0e1a0f 0%, var(--bg) 70%);
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  .frame{max-width:1080px;margin:0 auto;padding:14px 14px 40px}
  header{
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;
    border:2px solid var(--phos-dim);background:var(--panel);padding:10px 14px;margin-bottom:10px;
    box-shadow:0 0 18px rgba(93,255,126,.07) inset;
  }
  h1{margin:0;font-size:17px;letter-spacing:.22em;color:var(--phos);text-shadow:0 0 8px rgba(93,255,126,.55);font-weight:700}
  h1 small{color:var(--phos-dim);letter-spacing:.1em;font-weight:400}
  .hud{display:flex;gap:16px;flex-wrap:wrap;font-variant-numeric:tabular-nums}
  .hud b{color:var(--phos);text-shadow:0 0 6px rgba(93,255,126,.45)}
  .hud .amber b{color:var(--amber);text-shadow:0 0 6px rgba(255,181,77,.4)}
  main{display:grid;grid-template-columns:1fr 320px;gap:10px}
  /* тач/мобилка: всё действие на одном экране — компактные панели, кнопки прилипают снизу */
  @media(max-width:820px){
    main{grid-template-columns:1fr}
    body{font-size:13px}
    .frame{padding:8px 8px 20px}
    header{padding:8px 10px;margin-bottom:8px}
    h1{font-size:13px;letter-spacing:.12em}
    .hud{gap:8px 12px;font-size:12px}
    .viewport{min-height:0!important}
    .panel{padding:8px}
    .meter{height:8px;margin:1px 0 6px}
    button{padding:8px 10px;font-size:12px}
    .log{height:96px;font-size:12px}
    /* кнопки действий каждого режима — липнут к низу экрана */
    #groomScreen>.actions,#vacScreen>.actions,#litScreen>.actions,#stainScreen>.actions,#couchScreen>.actions,#nailScreen>.actions,#bedScreen>.actions{
      position:sticky;bottom:0;z-index:45;background:var(--bg);
      padding:8px 0;margin-top:8px;border-top:1px solid var(--phos-faint);
    }
    /* грумер: питомец и его статы рядом, инструменты — горизонтальная лента на всю ширину */
    #groomScreen .side{display:contents}
    #groomScreen main{grid-template-columns:5fr 4fr;gap:8px}
    #groomScreen .viewport{grid-column:1}
    #groomScreen .side .panel:first-child{grid-column:2;font-size:12px}
    #groomScreen .side .panel:last-child{grid-column:1/-1}
    #cv{width:min(100%,190px)}
    .tools{flex-direction:row;overflow-x:auto;padding-bottom:4px}
    .tool{min-width:132px;flex-shrink:0}
    .tool .tname{font-size:12px}
    /* лотки: три компактные колонки */
    .lboxes{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
    .lbox{padding:6px}
    .lbox h3{font-size:10px;letter-spacing:.1em}
    .lbox canvas{max-width:110px}
    .lbox .actions{gap:4px;margin-top:4px}
    .lbox button{padding:6px 5px;font-size:10px;letter-spacing:.02em}
    /* пятна: устав компактнее */
    .stinfo{font-size:11px}
    .contract{padding:10px}
  }
  .panel{border:2px solid var(--phos-dim);background:var(--panel);padding:10px}
  .panel h2{
    margin:-10px -10px 8px;padding:5px 10px;font-size:11px;letter-spacing:.3em;font-weight:700;
    color:var(--bg);background:var(--phos-dim);text-transform:uppercase;
  }
  .viewport{position:relative;display:flex;align-items:center;justify-content:center;background:var(--panel2);min-height:380px}
  canvas{image-rendering:pixelated;width:min(100%,440px)}
  #vcv,#tcv,#ccv,#bcv{width:min(100%,660px);cursor:crosshair}
  #ncv{width:min(100%,440px)}
  .catname{
    position:absolute;top:8px;left:10px;color:var(--phos);letter-spacing:.15em;font-size:13px;
    text-shadow:0 0 8px rgba(93,255,126,.5)
  }
  .floorfur{position:absolute;bottom:8px;right:10px;color:var(--phos-dim);font-size:12px}
  .meter{height:10px;background:var(--phos-faint);border:1px solid var(--phos-dim);margin:2px 0 8px;position:relative}
  .meter i{display:block;height:100%;background:var(--phos);box-shadow:0 0 8px rgba(93,255,126,.5)}
  .meter.warn i{background:var(--amber);box-shadow:0 0 8px rgba(255,181,77,.5)}
  .meter.bad i{background:var(--red);box-shadow:0 0 8px rgba(255,93,77,.5)}
  .meter .mark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--amber);box-shadow:0 0 6px rgba(255,181,77,.6)}
  .kv{display:flex;justify-content:space-between;gap:8px}
  .kv span:last-child{color:var(--phos)}
  .side{display:flex;flex-direction:column;gap:10px}
  .tools{display:flex;flex-direction:column;gap:6px}
  .tool{border:1px solid var(--phos-faint);padding:6px 8px;cursor:pointer;background:var(--panel2)}
  .tool:hover{border-color:var(--phos-dim)}
  .tool.eq{border-color:var(--phos);box-shadow:0 0 10px rgba(93,255,126,.2)}
  .tool .tname{color:var(--phos);font-size:13px}
  .tool .tdur{font-size:11px;color:var(--phos-dim)}
  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  button{
    font-family:var(--mono);font-size:13px;letter-spacing:.08em;text-transform:uppercase;
    background:var(--panel2);color:var(--phos);border:2px solid var(--phos-dim);
    padding:9px 14px;cursor:pointer;
  }
  button:hover:not(:disabled){border-color:var(--phos);box-shadow:0 0 12px rgba(93,255,126,.25);text-shadow:0 0 6px rgba(93,255,126,.5)}
  button:disabled{opacity:.35;cursor:default}
  button:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  button.amber{color:var(--amber);border-color:#8a6226}
  button.amber:hover:not(:disabled){border-color:var(--amber);box-shadow:0 0 12px rgba(255,181,77,.25)}
  button.ghost{border-color:var(--phos-faint);color:var(--phos-dim);padding:6px 10px;font-size:11px}
  .hint{font-size:12px;color:var(--phos-dim);align-self:center}
  .log{
    margin-top:10px;border:2px solid var(--phos-dim);background:#070c08;
    height:180px;overflow-y:auto;padding:8px 10px;font-size:13px;
  }
  .log p{margin:0 0 4px}
  .log .sys{color:var(--phos-dim)}
  .log .good{color:var(--phos)}
  .log .warn{color:var(--amber)}
  .log .bad{color:var(--red)}
  .log .quote{color:#8fd8a5;font-style:italic}
  .overlay{
    position:fixed;inset:0;background:rgba(4,8,5,.88);z-index:60;display:flex;align-items:center;justify-content:center;padding:16px;
  }
  .modal{
    max-width:640px;width:100%;max-height:90vh;overflow-y:auto;
    border:2px solid var(--phos);background:var(--panel);padding:18px 20px;
    box-shadow:0 0 40px rgba(93,255,126,.15);
  }
  .modal h2{color:var(--phos);letter-spacing:.2em;font-size:15px;margin:0 0 10px;text-shadow:0 0 8px rgba(93,255,126,.5)}
  .modal p{margin:0 0 10px;max-width:62ch}
  .shopitem{display:flex;justify-content:space-between;gap:10px;align-items:center;border-top:1px solid var(--phos-faint);padding:8px 0}
  .shopitem .sdesc{font-size:12px;color:var(--phos-dim);max-width:46ch}
  .shopitem .sname{color:var(--phos)}
  .shopitem .price{color:var(--amber);white-space:nowrap;font-variant-numeric:tabular-nums}
  .fake{border-left:3px solid var(--amber);padding-left:8px}
  .hidden{display:none}
  .win{color:var(--amber);text-shadow:0 0 10px rgba(255,181,77,.6)}
  footer{margin-top:14px;font-size:11px;color:var(--phos-dim);max-width:70ch}
  footer a{color:var(--phos-dim)}
  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
  .contract{
    border:2px solid var(--phos-dim);background:var(--panel);padding:14px;cursor:pointer;text-align:left;
    display:flex;flex-direction:column;gap:6px;
  }
  .contract:hover{border-color:var(--phos);box-shadow:0 0 16px rgba(93,255,126,.2)}
  .contract .cno{font-size:10px;letter-spacing:.3em;color:var(--phos-dim)}
  .contract .ctitle{color:var(--phos);font-size:15px;letter-spacing:.12em;text-transform:uppercase;text-shadow:0 0 6px rgba(93,255,126,.4)}
  .contract .cdesc{font-size:12px;color:var(--ink);opacity:.85;text-transform:none;letter-spacing:0}
  .boardhead{margin:6px 0 12px;color:var(--phos-dim);max-width:70ch}
  /* litter */
  .lboxes{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}
  .lbox{border:2px solid var(--phos-dim);background:var(--panel);padding:10px}
  .lbox h3{margin:0 0 6px;font-size:12px;letter-spacing:.2em;color:var(--phos)}
  .lbox canvas{width:100%;max-width:220px;display:block;margin:0 auto 6px}
  .lbox .labs{font-size:11px;color:var(--phos-dim);min-height:16px}
  /* stains */
  .stinfo{font-size:12px;line-height:1.55}
  .stinfo b{color:var(--phos)}
  .stinfo .rec{color:var(--amber)}
  .badge{display:inline-block;padding:0 6px;border:1px solid;font-size:10px;letter-spacing:.15em;text-transform:uppercase}
  .b-fresh{color:var(--phos);border-color:var(--phos)}
  .b-set{color:var(--red);border-color:var(--red)}
  .b-enz{color:#6fd8ff;border-color:#6fd8ff}
  /* leaderboard & nick */
  .lb table{width:100%;border-collapse:collapse;font-size:12px}
  .lb th,.lb td{text-align:left;padding:3px 6px;border-bottom:1px solid var(--phos-faint)}
  .lb th{color:var(--phos-dim);font-size:10px;letter-spacing:.2em;text-transform:uppercase}
  .lb td:last-child,.lb th:last-child{text-align:right}
  .lb tr.me td{color:var(--amber);text-shadow:0 0 6px rgba(255,181,77,.4)}
  .lbnote{font-size:11px;color:var(--amber);margin:6px 0 0}
  input.nick{
    width:100%;font-family:var(--mono);font-size:15px;letter-spacing:.1em;
    background:var(--panel2);color:var(--phos);border:2px solid var(--phos-dim);padding:8px 10px;
  }
  input.nick:focus{outline:none;border-color:var(--phos)}
  .advice{font-size:12px;color:var(--amber);margin-top:6px;min-height:16px}
  .lstatus{font-size:11px;letter-spacing:.08em;margin:2px 0 4px;min-height:14px}
  .lstatus.ok{color:var(--phos)} .lstatus.warn{color:var(--amber)} .lstatus.full{color:var(--red)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="frame">
  <header>
    <h1>PAWJURY <small>// WASTELAND GROOMER v0.4</small></h1>
    <div class="hud" id="hud"></div>
    <button class="ghost" id="bContracts">◂ Contracts</button>
  </header>

  <!-- CONTRACTS BOARD -->
  <section id="selScreen">
    <p class="boardhead" id="boardhead"></p>
    <div class="board" id="board"></div>
    <section class="panel lb" style="margin-top:10px">
      <h2 id="lbTitle"></h2>
      <div id="lbBody"></div>
      <div class="actions"><button class="ghost" id="bNick"></button></div>
    </section>
  </section>

  <!-- GROOMER -->
  <section id="groomScreen" class="hidden">
    <main>
      <section class="panel viewport">
        <div class="catname" id="catName">—</div>
        <canvas id="cv" width="96" height="80" aria-label="Pixel pet"></canvas>
        <div class="floorfur" id="floorFur"></div>
      </section>
      <div class="side">
        <section class="panel">
          <h2 id="pClient"></h2>
          <div class="kv"><span id="kFur"></span><span id="cFur">—</span></div>
          <div class="meter" id="mFurWrap"><i id="mFur" style="width:100%"></i></div>
          <div class="kv"><span id="kPat"></span><span id="cPat">—</span></div>
          <div class="meter" id="mPatWrap"><i id="mPat" style="width:100%"></i></div>
          <div class="kv"><span id="kTrust"></span><span id="cTrust">—</span></div>
          <div class="meter" id="mTrustWrap"><i id="mTrust" style="width:100%"></i></div>
          <div class="kv"><span id="kCoat"></span><span id="cCoat">—</span></div>
          <div class="kv"><span id="kTemp"></span><span id="cTemp">—</span></div>
          <div class="kv"><span id="kMats"></span><span id="cMats">—</span></div>
        </section>
        <section class="panel">
          <h2 id="pTools"></h2>
          <div class="tools" id="toolList"></div>
        </section>
      </div>
    </main>
    <div class="actions">
      <button id="bBrush"></button>
      <button id="bHand"></button>
      <button id="bTreat" class="amber"></button>
      <button id="bVac" class="hidden"></button>
      <button id="bNext"></button>
      <button id="bEndDay" class="amber"></button>
    </div>
  </section>

  <!-- VACUUM RUN -->
  <section id="vacScreen" class="hidden">
    <section class="panel" style="margin-bottom:10px">
      <div class="kv"><span id="kBat"></span><span id="vBat">100%</span></div>
      <div class="meter" id="mBatWrap"><i id="mBat" style="width:100%"></i></div>
      <div class="kv"><span id="kGot"></span><span id="vGot">0 g</span></div>
      <div class="meter" id="mGotWrap"><i id="mGot" style="width:0%"></i></div>
    </section>
    <section class="panel viewport" style="min-height:300px">
      <canvas id="vcv" width="200" height="140" aria-label="Room map"></canvas>
    </section>
    <div class="actions">
      <span class="hint" id="vHint"></span>
      <button id="vGiveUp" class="amber"></button>
    </div>
  </section>

  <!-- ODOR CONTROL -->
  <section id="litScreen" class="hidden">
    <section class="panel" style="margin-bottom:10px">
      <h2 id="pAir"></h2>
      <div class="kv"><span id="kOdor"></span><span id="lOdor">0 / 100</span></div>
      <div class="meter" id="mOdorWrap"><i id="mOdor" style="width:0%"></i><span class="mark" style="left:30%"></span></div>
      <div class="kv"><span id="kGuests"></span><span id="lTurns">—</span></div>
      <div class="advice" id="lAdvice"></div>
      <div class="hint" id="lHint" style="margin-top:6px"></div>
    </section>
    <div class="lboxes" id="lBoxes"></div>
    <div class="actions">
      <button id="lVent"></button>
      <button id="lWait"></button>
    </div>
  </section>

  <!-- STAIN RESPONSE -->
  <section id="stainScreen" class="hidden">
    <main>
      <section class="panel viewport" style="min-height:300px">
        <canvas id="tcv" width="200" height="140" aria-label="Carpet map"></canvas>
      </section>
      <div class="side">
        <section class="panel">
          <h2 id="pSel"></h2>
          <div class="stinfo" id="stInfo"></div>
        </section>
        <section class="panel">
          <h2 id="pManual"></h2>
          <div class="stinfo" id="stManual"></div>
        </section>
      </div>
    </main>
    <div class="actions">
      <button id="tBlot"></button>
      <button id="tEnzyme"></button>
      <button id="tScrub" class="amber"></button>
      <button id="tEnd"></button>
    </div>
  </section>

  <!-- COUCH RESCUE -->
  <section id="couchScreen" class="hidden">
    <main>
      <section class="panel viewport" style="min-height:300px">
        <canvas id="ccv" width="200" height="140" aria-label="Couch map"></canvas>
      </section>
      <div class="side">
        <section class="panel">
          <h2 id="pCSel"></h2>
          <div class="stinfo" id="cInfo"></div>
        </section>
        <section class="panel">
          <h2 id="pCManual"></h2>
          <div class="stinfo" id="cManual"></div>
        </section>
      </div>
    </main>
    <div class="actions">
      <button id="cRoll"></button>
      <button id="cRake"></button>
      <button id="cBlade"></button>
      <button id="cEnd"></button>
    </div>
  </section>

  <!-- NAIL TRIM -->
  <section id="nailScreen" class="hidden">
    <main>
      <section class="panel viewport" style="min-height:300px">
        <div class="catname" id="nDogName">—</div>
        <canvas id="ncv" width="120" height="100" aria-label="Nail cross-section"></canvas>
      </section>
      <div class="side">
        <section class="panel">
          <h2 id="pNDog"></h2>
          <div class="kv"><span id="kNPat"></span><span id="nPat">—</span></div>
          <div class="meter" id="mNPatWrap"><i id="mNPat" style="width:100%"></i></div>
          <div class="kv"><span id="kNHeat"></span><span id="nHeat">—</span></div>
          <div class="meter" id="mNHeatWrap"><i id="mNHeat" style="width:0%"></i></div>
          <div class="kv"><span id="kNNail"></span><span id="nNail">—</span></div>
          <div class="kv"><span id="kNStrikes"></span><span id="nStrikes">—</span></div>
        </section>
        <section class="panel">
          <h2 id="pNManual"></h2>
          <div class="stinfo" id="nManual"></div>
        </section>
      </div>
    </main>
    <div class="actions">
      <button id="nGrind"></button>
      <button id="nCheck"></button>
      <button id="nSoothe"></button>
      <button id="nNext" class="amber"></button>
    </div>
  </section>

  <!-- BEDTIME PATROL -->
  <section id="bedScreen" class="hidden">
    <section class="panel" style="margin-bottom:10px">
      <div class="kv"><span id="kBStrikes"></span><span id="bStrikes">—</span></div>
      <div class="advice" id="bAdvice"></div>
    </section>
    <section class="panel viewport" style="min-height:300px">
      <canvas id="bcv" width="200" height="140" aria-label="Bedroom map"></canvas>
    </section>
    <div class="actions">
      <span class="hint" id="bHint"></span>
      <button id="bBedEnd" class="amber"></button>
    </div>
  </section>

  <div class="log" id="log" aria-live="polite"></div>

  <footer id="foot"></footer>
</div>

<!-- GENERIC MODAL -->
<div class="overlay hidden" id="ovM">
  <div class="modal">
    <h2 id="mTitle"></h2>
    <div id="mBody"></div>
    <div class="actions" id="mBtns"></div>
  </div>
</div>

<script>
'use strict';
// ================= I18N =================
const LANG = (document.documentElement.lang||'en').startsWith('ru') ? 'ru' : 'en';
const STR = {
en:{
  boardhead:'The wasteland, 2287. Pets shed, dig, spill and stain — and somebody has to deal with it. Every contract is an endless shift: the longer you hold, the harder it gets. Points from all eight contracts add up on the guild leaderboard below.',
  contract:'CONTRACT', foot:'A <a href="/">PawJury</a> mini-game. Eight contracts, one wasteland, a lot of fur.',
  contracts:'◂ Contracts', boardLog:'Contracts board. Pick a job.',
  failed:'✖ SHIFT OVER: ',
  back:'Back to contracts', again:'Try again',
  cards:{
    cats:['Cat Groomer','An endless queue of vault cats and a 3-minute shift. Every gram of fur and every cap = points. Clients get crankier as the clock runs. 500 g still rolls a second cat (+500 pts).'],
    dogs:['Dog Groomer','Same shift, bigger clients: the doodles of the wasteland — more coat, more mats. 3 minutes; 800 g rolls a spare dog (+500 pts).'],
    vacuum:['Vacuum Run','One battery charge. Fur keeps falling — faster the longer you drive. Every gram is a point. You stop when the battery does.'],
    litter:['Odor Control','Three boxes, four cats, and the smell that never sleeps. Every turn you survive = points. Odor 100 ends the shift.'],
    stains:['Stain Response','Stains arrive faster every round. Points for every stain defeated, every round survived. Six stains at once and the carpet is lost.'],

const $ = id => document.getElementById(id);
const R = (a,b) => a + Math.random()*(b-a);
const RI = (a,b) => Math.floor(R(a,b+1));
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const SCREENS = ['selScreen','groomScreen','vacScreen','litScreen','stainScreen','couchScreen','nailScreen','bedScreen'];
let MODE = null;

function log(msg, cls){
  const p = document.createElement('p');
  p.className = cls||''; p.innerHTML = msg;
  const el = $('log'); el.appendChild(p); el.scrollTop = el.scrollHeight;
}
function clearLog(){ $('log').innerHTML=''; }
function showScreen(id){ SCREENS.forEach(s=>$(s).classList.toggle('hidden', s!==id)); }
function hud(html){ $('hud').innerHTML = html; }
function modal(title, bodyHtml, btns){
  $('mTitle').innerHTML = title; $('mBody').innerHTML = bodyHtml;
  const bb = $('mBtns'); bb.innerHTML='';
  btns.forEach(([label, fn, cls])=>{
    const b = document.createElement('button');
    b.innerHTML = label; if(cls) b.className = cls;
    b.onclick = ()=>{ $('ovM').classList.add('hidden'); fn && fn(); };
    bb.appendChild(b);
  });
  $('ovM').classList.remove('hidden');
}
// текущий счёт незавершённой партии (для сабмита при выходе с середины игры)
function activeScore(){
  if((MODE==='cats'||MODE==='dogs') && typeof G!=='undefined' && G && !G.over) return {mode:MODE, score:G_score(), end:()=>{G.over=true;}};
  if(MODE==='vacuum' && typeof V!=='undefined' && V && !V.over) return {mode:'vacuum', score:Math.round(V.got), end:()=>{V.over=true;}};
  if(MODE==='litter' && typeof L!=='undefined' && L && !L.over) return {mode:'litter', score:L.score, end:()=>{L.over=true;}};
  if(MODE==='stains' && typeof ST!=='undefined' && ST && !ST.over) return {mode:'stains', score:ST.score, end:()=>{ST.over=true;}};
  if(MODE==='couch' && typeof C!=='undefined' && C && !C.over) return {mode:'couch', score:C.score, end:()=>{C.over=true;}};
  if(MODE==='nails' && typeof N!=='undefined' && N && !N.over) return {mode:'nails', score:N.score, end:()=>{N.over=true;}};
  if(MODE==='bedtime' && typeof B!=='undefined' && B && !B.over) return {mode:'bedtime', score:Math.round(B.score), end:()=>{B.over=true;}};
  return null;
}
function contracts(){
  const a = activeScore();
  if(a && a.score>0){ LB_submit(a.mode, a.score); a.end(); }
  MODE = null; clearLog(); hud('');
  showScreen('selScreen');
  log(T.boardLog,'sys');
  LB_load();
}
// закрытие/сворачивание вкладки посреди партии: очки не теряются
window.addEventListener('pagehide', ()=>{
  const a = activeScore();
  if(a && a.score>0 && NICK){
    LB_saveLocal(a.mode, a.score);
    if(navigator.sendBeacon) navigator.sendBeacon(LB_API, JSON.stringify({nick:NICK, mode:a.mode, score:a.score}));
  }
});
function startMode(mode){
  if(!NICK){ askNick(()=>startMode(mode)); return; }
  MODE = mode; clearLog();
  if(mode==='cats'||mode==='dogs') G_start(mode);
  else if(mode==='vacuum') V_start();
  else if(mode==='litter') L_start();
  else if(mode==='stains') T_start();
  else if(mode==='couch') C_start();
  else if(mode==='nails') N_start();
  else if(mode==='bedtime') B_start();
}
function modalOpen(){ return !$('ovM').classList.contains('hidden'); }
// единая точка конца игры: лог, отправка очков, модалка
function gameOver(title, body, score, retryFn){
  log(T.finalScore(score),'good');
  LB_submit(MODE, score);
  modal(T.failed+title, body, [[T.again, retryFn, 'amber'], [T.back, contracts, 'ghost']]);
}

// Общий реестр очков живёт на pawjury.com; зеркало на GitHub Pages ходит туда же (CORS).
const LB_API = (location.hostname==='pawjury.com' ? '' : 'https://pawjury.com') + '/api/leaderboard';
let NICK = '';
try{ NICK = localStorage.getItem('pjNick')||''; }catch(e){}
function askNick(cb){
  modal(T.nickT, T.nickBody+'<input class="nick" id="nickIn" maxlength="16" autocomplete="off">', [[T.nickSave, ()=>{
    const v = ($('nickIn').value||'').trim().replace(/[<>&"'`]/g,'').slice(0,16);
    if(v.length<2){ askNick(cb); return; }
    NICK = v;
    try{ localStorage.setItem('pjNick', v); }catch(e){}
    cb && cb();
  }]]);
  setTimeout(()=>{
    const i = $('nickIn'); if(!i) return;
    i.value = NICK; i.focus();
    i.onkeydown = e=>{ if(e.key==='Enter'){ const b=$('mBtns').querySelector('button'); b && b.click(); } };
  }, 50);
}
function esc(s){ return String(s).replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
function LB_localAll(){
  try{ return JSON.parse(localStorage.getItem('pjScores')||'{}'); }catch(e){ return {}; }
}
function LB_saveLocal(mode, score){
  const all = LB_localAll();
  const me = all[NICK]||{};
  const improved = (me[mode]||0) < score;
  if(improved) me[mode] = score;
  all[NICK] = me;
  try{ localStorage.setItem('pjScores', JSON.stringify(all)); }catch(e){}
  return improved;
}
function LB_rows(list, localNote){
  let h = '';
  if(!list.length) h = '<p class="hint">'+T.lbEmpty+'</p>';
  else {
    h = '<table><tr><th>'+T.lbRank+'</th><th>'+T.lbPlayer+'</th><th>'+T.lbTotal+'</th></tr>';
    list.forEach((r,i)=>{
      h += '<tr'+(r.nick===NICK?' class="me"':'')+'><td>'+(i+1)+'</td><td>'+esc(r.nick)+(r.nick===NICK?' '+T.lbYou:'')+'</td><td>'+r.total+'</td></tr>';
    });
    h += '</table>';
  }
  if(localNote) h += '<p class="lbnote">'+T.lbLocal+'</p>';
  return h;
}
function LB_renderLocal(){
  const all = LB_localAll();
  const list = Object.keys(all)
    .map(nick=>({nick, total:Object.values(all[nick]).reduce((s,v)=>s+v,0)}))
    .sort((a,b)=>b.total-a.total);
  $('lbBody').innerHTML = LB_rows(list, true);
}
// локальные результаты подмешиваются к серверным: пока запись в реестр не настроена
// (или ещё не долетела), игрок всё равно видит себя в таблице — с пометкой
function LB_mergeLocal(server){
  const all = LB_localAll();
  let pending = false;
  const list = server.map(r=>({nick:r.nick, total:r.total}));
  Object.keys(all).forEach(nick=>{
    const total = Object.values(all[nick]).reduce((s,v)=>s+v,0);
    if(total<=0) return;
    const row = list.find(r=>r.nick===nick);
    if(row){ if(total>row.total){ row.total=total; pending=true; } }
    else { list.push({nick, total}); pending=true; }
  });
  list.sort((a,b)=>b.total-a.total);
  return {list, pending};
}
function LB_load(){
  $('lbBody').innerHTML = '<p class="hint">'+T.lbLoading+'</p>';
  fetch(LB_API).then(r=>r.ok?r.json():Promise.reject())
    .then(d=>{
      const m = LB_mergeLocal(d.leaderboard||[]);
      $('lbBody').innerHTML = LB_rows(m.list, false) + (m.pending?'<p class="lbnote">'+T.lbPending+'</p>':'');
    })
    .catch(()=>LB_renderLocal());
}
function LB_submit(mode, score){
  score = Math.round(score);
  if(score<=0 || !NICK) return;
  if(LB_saveLocal(mode, score)) log(T.newBest,'good');
  fetch(LB_API, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({nick:NICK, mode, score})})
    .then(r=>r.ok?r.json():Promise.reject())
    .then(()=>log(T.scoreSent(score),'sys'))
    .catch(()=>log(T.scoreLocal(score),'warn'));
}

  $('bNick').onclick=()=>askNick(LB_load);
})();

// ================= GROOMER =================
const TOOL_STATS = {
  furm:{price:35,dur:40}, hertzko:{price:15,dur:35}, purple:{price:20,dur:25},
  safari:{price:12,dur:70}, rubber:{price:10,dur:60}, dual:{price:11,dur:30},
  shark:{price:60,dur:0,equipment:true},
};
const TOOL_SHORT = {furm:'deShedding',hertzko:'Hertzko S',purple:'Purple L',safari:'Safari',rubber:'Rubber',dual:'Dual',shark:'Shark'};
const SPECIES = {
  cats:{win:500, base:{short:90,long:130}, pat:[65,100], sizes:['small','medium','large'], maxMats:3},
  dogs:{win:800, base:{short:120,long:190}, pat:[80,120], sizes:['medium','medium','large'], maxMats:4},
};
let G = null;
function noun(){ return LANG==='ru' ? (G.mode==='cats'?'кота':'пса') : (G.mode==='cats'?'cat':'dog'); }

const SHIFT_SECONDS = 180;
function G_start(mode){
  G = { sp:SPECIES[mode], mode,
        day:1, money:40, fur:0, stam:100, floor:0,
        inv:{}, eq:null, cat:null, catsLeft:0, sessionFur:0,
        earned:0, bonus:0, time:SHIFT_SECONDS, level:1, over:false,
        won:false, totalCats:0, baldIncidents:0 };
  showScreen('groomScreen');
  modal(T.gIntroT(T.gWinT[mode]), T.gIntro(mode, G.sp.win), [[T.gOpenShop, G_openShop]]);
  log(T.gAccepted(T.gWinT[mode]),'sys');
}
function G_score(){ return Math.round(G.fur) + G.earned*2 + G.bonus; }
function G_hud(){
  const t = Math.max(0,G.time), mm = Math.floor(t/60), ss = ('0'+(t%60)).slice(-2);
  hud('<span'+(t<=30?' class="amber"':'')+'>'+T.time+' <b>'+mm+':'+ss+'</b></span>'+
      '<span>'+T.score+' <b>'+G_score()+'</b></span>'+
      '<span>'+T.day+' <b>'+G.day+'</b></span>'+
      '<span class="amber">'+T.caps+' <b>$'+G.money+'</b></span>'+
      '<span>'+T.fur+' <b>'+Math.round(G.fur)+' g</b> / '+G.sp.win+'</span>'+
      '<span>'+T.energy+' <b>'+Math.round(G.stam)+'</b></span>');
}
// смена: часы тикают только вне модалок (лавка и интро — «бесплатны»)
setInterval(()=>{
  if((MODE!=='cats'&&MODE!=='dogs') || !G || G.over || modalOpen()) return;
  G.time--;
  const lvl = 1 + Math.floor((SHIFT_SECONDS-G.time)/40);
  if(lvl>G.level){ G.level=lvl; log(T.diffUp,'warn'); }
  if(G.time<=0){ G_timeUp(); return; }
  G_hud();
}, 1000);
function G_timeUp(){
  if(G.over) return;
  G.over = true;
  if(G.cat && !G.cat.done) G_endSession(true);
  const score = G_score();
  G_render();
  gameOver(T.gWinT[G.mode], T.shiftEnd(score, Math.round(G.fur), G.earned, G.totalCats, G.baldIncidents), score, ()=>G_start(G.mode));
}
function G_newPet(){
  const sp = G.sp, lvl = G.level||1;
  const coat = Math.random()<.45?'long':'short';
  const size = pick(sp.sizes);
  const dense = Math.random()<.5;
  // рост сложности: клиенты нервнее, нетерпеливее, колтунов больше — но и шерсти больше
  const temper = Math.random() < Math.min(.55, .25+.06*(lvl-1)) ? 'skittish' : pick(['chill','normal','normal']);
  const base = sp.base[coat];
  const c = {
    name:pick(G.mode==='cats'?T.catNames:T.dogNames), coat, size, dense, temper,
    hue: pick(G.mode==='dogs' ? ['#8a5a2a','#c9a05e','#4d4d4d','#b06a3a','#d8cfa8']
                              : ['#c98f4e','#9a9a9a','#4d4d4d','#d8d8d8','#b06a3a']),
    spots: G.mode==='dogs' && Math.random()<.5,
    furMax: Math.round(base*(dense?1.5:1)*(size==='large'?1.25:size==='small'?.8:1)*(1+.05*(lvl-1))),
    trust: RI(40,70),
    patience: Math.round(RI(sp.pat[0],sp.pat[1]) * Math.max(.55, 1-.06*(lvl-1))),
    patMax:sp.pat[1],
    mats: coat==='long'?RI(0, sp.maxMats + Math.floor((lvl-1)/2)):0,
    overbrush:0, bald:false, fled:false, shine:false, done:false,
  };
  c.fur = c.furMax;
  return c;
}
function meterSet(id, val, max){
  const el = $('m'+id), wrap = $('m'+id+'Wrap');
  const pc = clamp(val/max*100,0,100);
  el.style.width = pc+'%';
  wrap.className = 'meter' + (pc<25?' bad':pc<55?' warn':'');
}
function G_render(){
  G_hud();
  $('floorFur').textContent = G.floor>0.5 ? T.floorFur(Math.round(G.floor)) : '';
  const c = G.cat;
  if(c && !c.done){
    $('catName').textContent = '▸ '+c.name.toUpperCase()+T.clientsLeft(G.catsLeft);
    $('cFur').textContent = Math.round(c.fur)+' / '+c.furMax+' g';
    $('cPat').textContent = Math.round(c.patience);
    $('cTrust').textContent = Math.round(c.trust);
    $('cCoat').textContent = T.coats[c.coat]+(c.dense?T.undercoat:'')+' / '+T.sizes[c.size];
    $('cTemp').textContent = T.temps[c.temper];
    $('cMats').textContent = c.mats>0? '⚠ '+c.mats : T.none;
    meterSet('Fur', c.fur, c.furMax); meterSet('Pat', c.patience, c.patMax); meterSet('Trust', c.trust, 100);
  } else {
    $('catName').textContent = T.empty;
    ['cFur','cPat','cTrust','cCoat','cTemp','cMats'].forEach(i=>$(i).textContent='—');
    meterSet('Fur',0,1);meterSet('Pat',0,1);meterSet('Trust',0,1);
  }
  const tl = $('toolList'); tl.innerHTML='';
  const ids = Object.keys(G.inv);
  if(!ids.length) tl.innerHTML = '<div class="tdur">'+T.noTools+'</div>';
  ids.forEach(id=>{
    const st = TOOL_STATS[id], inv = G.inv[id];
    const d = document.createElement('div');
    d.className = 'tool'+(G.eq===id?' eq':'');
    d.innerHTML = '<div class="tname">'+(G.eq===id?'▸ ':'')+T.tools[id][0]+(inv.fake?' <span style="color:var(--amber)">'+T.suspicious+'</span>':'')+'</div>'
      + '<div class="tdur">'+(st.equipment?T.equipment:T.durability+Math.max(0,Math.round(inv.dur))+'/'+inv.durMax)+'</div>';
    if(!st.equipment) d.onclick = ()=>{ G.eq=id; log(T.holding(T.tools[id][0]),'sys'); G_render(); };
    tl.appendChild(d);
  });
  const active = !G.over && c && !c.done && !c.fled;
  $('bBrush').disabled = !active || !G.eq || G.stam<6;
  $('bBrush').textContent = G.eq? T.brush+TOOL_SHORT[G.eq] : T.brushNo;
  $('bHand').disabled = !active || G.stam<3;
  $('bTreat').disabled = !active || G.money<2;
  $('bVac').classList.toggle('hidden', !G.inv.shark);
  $('bVac').disabled = G.over || G.floor<1 || G.stam<10;
  $('bNext').disabled = G.over || !c || c.done;
  $('bEndDay').disabled = G.over;
  G_draw();
}
const cv = $('cv'), cx = cv.getContext('2d');
let shakeT = 0;
function G_draw(){
  if(MODE!=='cats' && MODE!=='dogs') return;
  cx.clearRect(0,0,96,80);
  cx.fillStyle = '#0f1a10'; cx.fillRect(0,66,96,14);
  if(G.floor>0.5){
    cx.fillStyle = '#8fd8a5';
    const n = Math.min(30, Math.round(G.floor/3)+3);
    for(let i=0;i<n;i++){ const x=(i*37)%90+3, y=67+((i*13)%9); cx.fillRect(x,y,2,1); }
  }
  const c = G.cat;
  if(!c || c.done) { cx.fillStyle='#1c4027'; cx.font='8px monospace'; cx.fillText(T.noClient, 26,40); return; }
  const isDog = G.mode==='dogs';
  const dx = shakeT>0 ? (Math.random()*2-1)*2 : 0;
  const fluff = c.fur/c.furMax;
  cx.fillStyle = 'rgba(191,255,208,.5)';
  const halo = Math.round(40*fluff*(c.coat==='long'?1.6:1));
  for(let i=0;i<halo;i++){
    const a = (i/halo)*Math.PI*2 + (i%3);
    const rx = 26+((i*7)%5), ry = 15+((i*5)%4);
    cx.fillRect(48+dx+Math.cos(a)*rx, 44+Math.sin(a)*ry, 1,1);
  }
  cx.fillStyle = c.hue;
  const w = (c.size==='large'?46:c.size==='small'?32:40)+(isDog?8:0), h = (c.size==='small'?18:22)+(isDog?2:0);
  const bx = 48-w/2+dx, by = 60-h;
  cx.fillRect(bx,by,w,h);
  cx.fillRect(bx+2,by-3,w-4,4);
  const tphase = Math.floor(Date.now()/400)%2;
  let hx, hy, hs;
  if(isDog){
    // пёс: хвост торчком и машет, лапы, морда с носом, висячие уши, ошейник, язык, пятна
    cx.fillRect(bx+w-2, by-10+tphase*4, 3, 12);
    cx.fillRect(bx+w+1-tphase*2, by-12+tphase*4, 4, 3);
    cx.fillRect(bx+3, by+h, 4, 5); cx.fillRect(bx+w-7, by+h, 4, 5);
    hs = (c.size==='small'?15:17);
    hx = bx-hs+9; hy = by-hs+2;
    cx.fillRect(hx, hy, hs, hs);
    cx.fillRect(hx-8, hy+7, 10, 6); // морда
    cx.fillStyle='#0a0f0a'; cx.fillRect(hx-8, hy+7, 3, 3); // нос
    cx.fillStyle='rgba(0,0,0,.35)'; // висячие уши темнее
    cx.fillRect(hx-1, hy+1, 4, 11); cx.fillRect(hx+hs-3, hy+1, 4, 11);
    cx.fillStyle='#a3392e'; cx.fillRect(hx+3, hy+hs, hs-5, 3); // ошейник
    if(c.trust>60){ cx.fillStyle='#e88a8a'; cx.fillRect(hx-4, hy+13+tphase, 3, 4); } // язык
    if(c.spots){
      cx.fillStyle='rgba(0,0,0,.22)';
      cx.fillRect(bx+w*.2, by+3, 8, 7); cx.fillRect(bx+w*.55, by+h-9, 9, 6); cx.fillRect(bx+w*.78, by+2, 6, 5);
    }
  } else {
    // кот: длинный хвост с изгибом, острые уши, полоски
    cx.fillRect(bx+w, by+3+tphase*2, 10, 3); cx.fillRect(bx+w+8, by-1+tphase*3, 3, 6);
    hs = (c.size==='small'?14:16);
    hx = bx-hs+4; hy = by-hs+6;
    cx.fillRect(hx, hy, hs, hs);
    cx.fillRect(bx-hs+4, by-hs+2, 4,4); cx.fillRect(bx, by-hs+2, 4,4);
    cx.fillStyle = 'rgba(0,0,0,.28)';
    for(let i=0;i<4;i++) cx.fillRect(bx+6+i*9, by+1, 3, h-6);
  }
  if(c.bald){ cx.fillStyle='#e8a4a4'; cx.fillRect(bx+w*.35, by+4, 7,5); cx.fillRect(bx+w*.62, by+9, 5,4); }
  cx.fillStyle = c.trust<25 ? '#ff5d4d' : '#0a0f0a';
  cx.fillRect(hx+3, hy+5, 2,2); cx.fillRect(hx+8, hy+5, 2,2);
  if(c.shine){ cx.fillStyle='#fff2c8'; [[bx+8,by-6],[bx+w-10,by-4],[bx+w/2,by-8]].forEach(([x,y])=>{cx.fillRect(x,y,1,1);cx.fillRect(x-1,y,3,1);cx.fillRect(x,y-1,1,3);}); }
  if(c.mats>0){ cx.fillStyle='#3a2a1a'; for(let i=0;i<c.mats;i++) cx.fillRect(bx+8+i*11, by+h-7, 4,4); }
  cx.fillStyle = '#5dff7e'; cx.font='7px monospace';
  cx.fillText(c.trust>70?(isDog?'wag wag':'purr...'):c.trust<25?(isDog?'GRRR!':'HISS!'):'', hx-2, hy-2);
  if(shakeT>0) shakeT--;
}
setInterval(()=>{ if(MODE==='cats'||MODE==='dogs') G_draw(); }, 400);

function G_gainFur(g){
  G.fur += g; G.sessionFur += g;
  if(!G.won && G.fur>=G.sp.win) G_win();
}
function G_spendStam(n){ G.stam = Math.max(0, G.stam-n); if(G.stam<3) log(T.fumes,'warn'); }
function G_patHit(c, n){
  const mult = (c.temper==='skittish'?1.5:c.temper==='chill'?0.7:1) * (1+.12*((G.level||1)-1));
  c.patience = Math.max(0, c.patience - n*mult);
}
function G_checkSession(c){
  if(c.trust<10 && Math.random()<.6){
    c.fled = true; log(G.mode==='dogs'?T.fledDog(c.name):T.fledCat(c.name),'bad');
    G_endSession(false); return true;
  }
  if(c.patience<=0){ log(T.outPatience(c.name),'warn'); G_endSession(true); return true; }
  return false;
}
function G_endSession(paid){
  const c = G.cat; if(!c || c.done) return;
  c.done = true;
  if(paid && G.sessionFur>0.5){
    let pay = Math.round(G.sessionFur*0.12);
    let note = [];
    if(c.bald){ pay = Math.max(0,pay-5); note.push(T.fineBald); G.baldIncidents++; }
    else if(c.trust>=70){ pay += 5; note.push(T.tip); }
    if(c.shine){ pay += 4; note.push(T.shineBonus); }
    if(G.sessionFur>=60) log(T.marvel(noun()),'good');
    G.money += pay; G.earned += pay;
    log(T.sessionDone(c.name, Math.round(G.sessionFur), pay, note.length?' ('+note.join(', ')+')':''),'good');
    if(c.fur<c.furMax*0.5) log(T.lighter(c.name),'sys');
  } else if(paid){
    log(T.shrug,'warn');
  }
  G.totalCats++; G.sessionFur = 0;
  G_render();
}
function G_nextPet(){
  if(G.catsLeft<=0){ log(T.queueEmpty,'sys'); return; }
  if(G.cat && !G.cat.done) G_endSession(true);
  G.catsLeft--; G.cat = G_newPet(); G.sessionFur = 0;
  const c = G.cat;
  log(T.client(c.name, T.coats[c.coat], c.dense, T.sizes[c.size], T.temps[c.temper], c.mats),'sys');
  G_render();
}
function G_brush(){
  const c = G.cat, id = G.eq;
  if(!c || c.done || !id) return;
  const inv = G.inv[id];
  shakeT = 3;
  let g = 0, stam = 6;
  const fakeMult = inv.fake ? 0.5 : 1;

  if(id==='furm'){
    g = R(12,20) * (c.dense?1.6:1);
    if(c.coat==='long' && c.mats>0){ g*=0.6; log(T.matsBlock,'warn'); }
    c.overbrush++;
    c.trust -= c.temper==='chill'?2:4;
    if(c.overbrush>3 && Math.random() < (c.overbrush-3)*0.12){
      c.bald = true; c.trust -= 30; g*=0.5;
      log(T.baldSpot(c.name),'bad');
    }
    if(Math.random()<.25){ const s=g*.3; g-=s; G.floor += s; log(T.static(Math.round(s)),'warn'); }
    if(Math.random()<.15) log(T.eject,'sys');
  }
  else if(id==='hertzko'){
    g = R(8,12);
    stam = 9;
    if(c.size==='small'){ g*=0.7; if(Math.random()<.4) log(T.oversized(noun()),'warn'); }
    c.trust -= 1;
    if(Math.random()<.3) log(T.selfClean,'sys');
    if(Math.random()<.2) log(T.holdButton,'warn');
  }
  else if(id==='purple'){
    if(c.size==='small'){ g = R(3,5); if(Math.random()<.5) log(T.tooBig(noun()),'warn'); }
    else if(c.coat==='long'){
      g = R(14,18);
      if(c.mats>0){ c.mats--; g+=10; c.trust+=2; log(T.matOut(c.name),'good'); }
    } else { g = R(3,5); if(Math.random()<.5) log(T.gaps,'warn'); }
    c.trust -= 1;
    if(Math.random()<.03){ inv.dur = 0; log(T.handleCrack,'bad'); }
  }
  else if(id==='safari'){
    if(Math.random()<.25){ g = R(0.5,1.5); log(T.slipThrough,'warn'); }
    else g = R(7,10);
    c.trust += 2;
    if(Math.random()<.25) log(T.delighted(c.name),'good');
  }
  else if(id==='rubber'){
    if(c.coat==='short' && Math.random()<.3){ g = 0; log(T.noGrab,'warn'); }
    else g = R(4,6);
    c.trust += 3;
    const s = g*0.5; g -= s; G.floor += s;
    if(s>0.5) log(T.flies(Math.round(s)),'warn');
    if(c.temper==='skittish') log(T.gentle(noun()),'sys');
  }
  else if(id==='dual'){
    g = R(2,9);
    c.shine = true; c.trust += 1;
    if(Math.random()<.3) log(T.mystery(Math.round(g)),'sys');
    if(Math.random()<.05){ inv.dur -= 10; log(T.pinOut,'bad'); }
    if(Math.random()<.4) log(T.shine(c.name),'good');
  }

  g = Math.min(g*fakeMult, c.fur);
  if(inv.fake && Math.random()<.3) log(T.counterfeit,'warn');
  c.fur -= g; G_gainFur(g);
  inv.dur -= inv.fake?2.5:1;
  c.trust = clamp(c.trust,0,100);
  G_patHit(c, id==='rubber'?4:7);
  G_spendStam(stam);
  if(g>0.5) log(T.brushed(Math.round(g), Math.round(c.fur)),'');
  if(inv.dur<=0 && !TOOL_STATS[id].equipment){
    log(T.broke(T.tools[id][0]),'bad');
    delete G.inv[id]; if(G.eq===id) G.eq = Object.keys(G.inv).find(k=>!TOOL_STATS[k].equipment)||null;
  }
  if(!G_checkSession(c)) G_render();
}
function G_hand(){
  const c = G.cat; if(!c||c.done) return;
  shakeT = 1;
  c.trust = clamp(c.trust+6,0,100);
  const g = Math.min(R(1,2.5), c.fur);
  c.fur -= g; G_gainFur(g);
  G_patHit(c,3); G_spendStam(3);
  log(T.petted(g.toFixed(1)),'');
  if(!G_checkSession(c)) G_render();
}
function G_treat(){
  const c = G.cat; if(!c||c.done||G.money<2) return;
  G.money -= 2; c.trust = clamp(c.trust+14,0,100); c.patience = Math.min(c.patMax, c.patience+12);
  log(T.treat(c.name),'good');
  G_render();
}
function G_vacuum(){
  if(!G.inv.shark || G.floor<1) return;
  const g = G.floor; G.floor = 0; G_gainFur(g);
  G_spendStam(10);
  log(T.vacuumed(Math.round(g)),'good');
  const c = G.cat;
  if(c && !c.done && c.temper==='skittish'){ G_patHit(c,15); c.trust-=8; log(T.roar(noun()),'warn'); if(G_checkSession(c)) return; }
  G_render();
}
function G_openShop(){
  showScreen('groomScreen');
  modal(T.shopT, T.shopHead(G.money), [[T.startDay, G_startDay]]);
  const list = $('shopList');
  Object.keys(TOOL_STATS).forEach(id=>{
    const st = TOOL_STATS[id];
    if(G.inv[id] && st.equipment) return;
    const row = document.createElement('div'); row.className='shopitem';
    row.innerHTML = '<div><div class="sname">'+T.tools[id][0]+'</div><div class="sdesc">'+T.tools[id][1]+'</div></div>';
    const btn = document.createElement('button');
    btn.className='amber'; btn.innerHTML='$'+st.price;
    btn.disabled = G.money<st.price || !!(G.inv[id]&&!st.equipment&&G.inv[id].dur>0);
    btn.onclick = (e)=>{ e.stopPropagation(); G_buy(id, st.price, false); G_refreshShopMoney(); btn.disabled = true; };
    const pr = document.createElement('div'); pr.className='price'; pr.appendChild(btn);
    row.appendChild(pr); list.appendChild(row);
  });
  if(G.day>1 && Math.random()<.5 && !G.inv.furm){
    const row = document.createElement('div'); row.className='shopitem fake';
    row.innerHTML = '<div><div class="sname">'+T.fakeName+'</div><div class="sdesc">'+T.fakeDesc+'</div></div>';
    const btn = document.createElement('button'); btn.className='amber'; btn.innerHTML='$19';
    btn.disabled = G.money<19;
    btn.onclick = (e)=>{ e.stopPropagation(); G_buy('furm', 19, Math.random()<.6); G_refreshShopMoney(); btn.disabled = true; };
    const pr = document.createElement('div'); pr.className='price'; pr.appendChild(btn);
    row.appendChild(pr); list.appendChild(row);
  }
}
function G_refreshShopMoney(){
  const el = document.querySelector('#mBody .win'); if(el) el.textContent = '$'+G.money;
}
function G_buy(id, price, fake){
  if(G.money<price) return;
  G.money -= price;
  const st = TOOL_STATS[id];
  let dur = st.dur;
  if(id==='safari' && Math.random()<.1){ dur = 20; log(T.safariDmg,'warn'); }
  G.inv[id] = {dur, durMax:st.dur, fake:!!fake};
  if(!st.equipment && !G.eq) G.eq = id;
  log(T.bought(T.tools[id][0], price),'sys');
  G_render();
}
function G_startDay(){
  G.stam = 100; G.catsLeft = RI(3,4);
  log(T.dayStart(G.day, G.catsLeft),'sys');
  G_nextPet();
}
function G_endDay(){
  if(G.cat && !G.cat.done) G_endSession(true);
  G.cat = null; G.catsLeft = 0; G.day++;
  log(T.dayOver,'sys');
  G_render(); G_openShop();
}
function G_win(){
  // веха «второй кот» — теперь бонус к очкам, смена продолжается
  G.won = true; G.bonus += 500;
  log(T.gBonus(G.sp.win, G.mode),'good');
}

const VW=10, VH=7, VC=20; // 200x140 canvas, 20px cells
const vcv = $('vcv'), vx = vcv.getContext('2d');
let V = null;
// furniture: sofa (2 cells), table, plant — impassable
const FURN = { sofa:[[2,1],[3,1]], table:[[6,3]], plant:[[8,1]] };
const BLOCKED = new Set([].concat(FURN.sofa,FURN.table,FURN.plant).map(c=>c[0]+','+c[1]));
function V_start(){
  V = { vac:{x:0,y:0}, battery:100, got:0, fur:{}, moving:false, tiles:0, fasterAt:60,
        cat:{x:VW-2,y:VH-2,awake:0}, over:false, hover:null };

    V.fur[k]=RI(4,16); placed++;
  }
  // bonus tufts hugging the sofa edge
  [[2,2],[3,2],[4,1]].forEach(([x,y])=>{ const k=x+','+y; if(!BLOCKED.has(k)) V.fur[k]=(V.fur[k]||0)+RI(8,14); });

}
function V_render(){

      '<span>'+T.score+' <b>'+Math.round(V.got)+'</b></span>');
  $('vBat').textContent = Math.max(0,Math.round(V.battery))+'%';
  $('vGot').textContent = Math.round(V.got)+' g';

  $('mBatWrap').className='meter'+(V.battery<25?' bad':V.battery<55?' warn':'');
  $('mGot').style.width=clamp(V.got/3,0,100)+'%';
  $('mGotWrap').className='meter';
  V_draw();
}
function V_spawnTuft(g){
  let x,y,guard=0;
  do{ x=RI(0,VW-1); y=RI(0,VH-1); }while((BLOCKED.has(x+','+y)||(x===0&&y===0)) && guard++<40);
  const k=x+','+y;
  V.fur[k]=(V.fur[k]||0)+g;
}
function V_draw(){
  // wooden floor
  for(let y=0;y<VH;y++) for(let x=0;x<VW;x++){
    vx.fillStyle = (y%2)? '#191307':'#150f06';
    vx.fillRect(x*VC, y*VC, VC, VC);
    vx.fillStyle = 'rgba(0,0,0,.25)';
    vx.fillRect(x*VC, y*VC+VC-1, VC, 1); // plank seams
    if((x*3+y)%4===0){ vx.fillStyle='rgba(255,255,255,.03)'; vx.fillRect(x*VC+3, y*VC+RI(2,14), 6,1); }
  }
  // rug
  vx.fillStyle='#12241a'; vx.fillRect(3*VC, 3*VC, 4*VC, 3*VC);
  vx.strokeStyle='#1c4027'; vx.lineWidth=2; vx.strokeRect(3*VC+3, 3*VC+3, 4*VC-6, 3*VC-6);
  // dock
  vx.fillStyle='#1c4027'; vx.fillRect(1,1,VC-2,VC-2);
  vx.fillStyle='#5dff7e'; vx.fillRect(7,4,3,6); vx.fillRect(10,8,3,6); // lightning
  // hover highlight
  if(V.hover && !V.moving && !V.over){
    vx.fillStyle='rgba(93,255,126,.12)';
    vx.fillRect(V.hover.x*VC, V.hover.y*VC, VC, VC);
    vx.strokeStyle='rgba(93,255,126,.5)'; vx.lineWidth=1;
    vx.strokeRect(V.hover.x*VC+.5, V.hover.y*VC+.5, VC-1, VC-1);
    if(V.hover.cost!=null){
      vx.fillStyle='#ffb54d'; vx.font='9px monospace';
      vx.fillText('-'+V.hover.cost+'%', V.hover.x*VC+2, V.hover.y*VC+9);
    }
  }
  // fur tufts
  Object.keys(V.fur).forEach(k=>{
    const [x,y]=k.split(',').map(Number), g=V.fur[k];
    const cxp=x*VC+VC/2, cyp=y*VC+VC/2;
    const r = clamp(2+g/3, 3, 9);
    vx.fillStyle='rgba(0,0,0,.3)';
    vx.beginPath(); vx.ellipse(cxp+1, cyp+2, r, r*0.6, 0, 0, 7); vx.fill();
    vx.fillStyle='#8fd8a5';
    for(let i=0;i<Math.round(r*2.2);i++){
      const a=i*2.399, rr=r*Math.sqrt((i%7)/7);
      vx.fillRect(cxp+Math.cos(a)*rr, cyp+Math.sin(a)*rr*0.7, 2,2);
    }
    vx.fillStyle='#cfeedd';
    vx.fillRect(cxp-1, cyp-1, 2,2);
  });
  // sofa
  vx.fillStyle='#24301f'; vx.fillRect(2*VC, 1*VC-6, 2*VC, VC+6);
  vx.fillStyle='#2e3d28'; vx.fillRect(2*VC+2, 1*VC-2, 2*VC-4, VC-6);
  vx.fillStyle='#1a241a'; vx.fillRect(2*VC, 1*VC+VC-4, 4,4); vx.fillRect(4*VC-4, 1*VC+VC-4, 4,4);
  // table
  vx.fillStyle='#3a2c14'; vx.fillRect(6*VC+2, 3*VC+2, VC-4, VC-6);
  vx.fillStyle='#241a0a'; vx.fillRect(6*VC+3, 3*VC+VC-6, 3,4); vx.fillRect(7*VC-6, 3*VC+VC-6, 3,4);
  // plant
  vx.fillStyle='#5a3018'; vx.fillRect(8*VC+6, 1*VC+11, 8, 7);
  vx.fillStyle='#2f7a45';
  vx.fillRect(8*VC+8, 1*VC+3, 4,9); vx.fillRect(8*VC+4, 1*VC+6, 4,5); vx.fillRect(8*VC+12, 1*VC+6, 4,5);
  // cat (sleeping curl or awake)
  const ct=V.cat, ccx=ct.x*VC+VC/2, ccy=ct.y*VC+VC/2;
  vx.fillStyle='#c98f4e';
  vx.beginPath(); vx.ellipse(ccx, ccy+2, 8, 5, 0, 0, 7); vx.fill();
  vx.fillRect(ccx-8, ccy-5, 7, 7); // head
  vx.fillRect(ccx-8, ccy-7, 2,2); vx.fillRect(ccx-3, ccy-7, 2,2); // ears
  vx.fillStyle='#a8743c'; vx.fillRect(ccx+2, ccy-1, 7,2); // tail curl
  if(ct.awake>0){
    vx.fillStyle='#ff5d4d'; vx.fillRect(ccx-7, ccy-3, 2,2); vx.fillRect(ccx-4, ccy-3, 2,2);
    vx.fillStyle='#ffb54d'; vx.font='8px monospace'; vx.fillText('!!', ccx-2, ccy-9);
  } else {
    vx.fillStyle='#0a0f0a'; vx.fillRect(ccx-7, ccy-2, 3,1); vx.fillRect(ccx-3, ccy-2, 2,1);
    vx.fillStyle='#5dff7e'; vx.font='7px monospace';
    if(Math.floor(Date.now()/700)%2) vx.fillText('z', ccx+2, ccy-8);
    else vx.fillText('zZ', ccx+1, ccy-7);
  }
  // vacuum robot
  const vp=V.vac, vpx=vp.x*VC+VC/2, vpy=vp.y*VC+VC/2;
  if(V.moving){ vx.fillStyle='rgba(255,181,77,.25)'; vx.beginPath(); vx.arc(vpx,vpy,11,0,7); vx.fill(); }
  vx.fillStyle='rgba(0,0,0,.4)'; vx.beginPath(); vx.ellipse(vpx+1,vpy+3,8,5,0,0,7); vx.fill();
  vx.fillStyle= V.battery>25? '#ffb54d' : '#ff5d4d';
  vx.beginPath(); vx.arc(vpx,vpy,8,0,7); vx.fill();
  vx.fillStyle='#8a6226'; vx.beginPath(); vx.arc(vpx,vpy,5,0,7); vx.fill();
  vx.fillStyle='#0a0f0a'; vx.beginPath(); vx.arc(vpx,vpy,2,0,7); vx.fill();
  vx.fillStyle='#fff2c8'; vx.fillRect(vpx-1,vpy-8,2,2); // sensor light
}
setInterval(()=>{ if(MODE==='vacuum'&&V&&!V.over) V_draw(); }, 500);
function V_bfs(from, to){
  if(BLOCKED.has(to.x+','+to.y)) return null;
  const q=[[from.x,from.y]], prev={}, seen=new Set([from.x+','+from.y]);
  while(q.length){
    const [x,y]=q.shift();
    if(x===to.x&&y===to.y){
      const path=[]; let k=x+','+y;
      while(prev[k]){ const [px,py]=k.split(',').map(Number); path.unshift([px,py]); k=prev[k]; }
      return path;
    }
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
      const nx=x+dx, ny=y+dy, nk=nx+','+ny;
      if(nx<0||ny<0||nx>=VW||ny>=VH||seen.has(nk)||BLOCKED.has(nk)) return;
      seen.add(nk); prev[nk]=x+','+y; q.push([nx,ny]);
    });
  }
  return null;
}
function V_cell(e){
  const r = vcv.getBoundingClientRect();
  return { x: clamp(Math.floor((e.clientX-r.left)/r.width*VW),0,VW-1),
           y: clamp(Math.floor((e.clientY-r.top)/r.height*VH),0,VH-1) };
}
vcv.addEventListener('mousemove', e=>{
  if(MODE!=='vacuum'||!V||V.over||V.moving) return;
  const c = V_cell(e);
  const path = V_bfs(V.vac, c);
  V.hover = {x:c.x, y:c.y, cost: path? path.length : null};
});
vcv.addEventListener('mouseleave', ()=>{ if(V) V.hover=null; });
vcv.addEventListener('click', e=>{
  if(MODE!=='vacuum' || !V || V.over || V.moving) return;
  const c = V_cell(e);
  const path = V_bfs(V.vac, c);
  if(!path || !path.length) return;
  V.moving = true; V.hover = null;
  const step = ()=>{
    if(V.over){ V.moving=false; return; }
    const nxt = path.shift();
    if(!nxt || V.battery<=0){ V.moving=false; V_finishCheck(); return; }
    V.battery -= 1;
    V.tiles++;
    V.vac = {x:nxt[0], y:nxt[1]};
    // dino-режим: шерсть подсыпается тем быстрее, чем дольше ездим
    if(Math.random() < .08 + V.tiles*0.0015) V_spawnTuft(RI(2,6));
    if(V.tiles===V.fasterAt){ V.fasterAt+=60; log(T.vFaster,'warn'); }
    const k = nxt[0]+','+nxt[1];
    if(V.fur[k]){
      const g=V.fur[k]; delete V.fur[k];
      if(g>=12 && Math.random() < Math.min(.5, .2 + V.tiles*0.002)){ V.battery-=5; log(T.vJam(g),'warn'); }
      V.got += g;
      log(T.vSucked(g),'');
    }
    if(Math.abs(nxt[0]-V.cat.x)<=1 && Math.abs(nxt[1]-V.cat.y)<=1 && V.cat.awake<=0){
      V.cat.awake = 6;
      let nx, ny, guard=0;
      do{ nx=RI(0,VW-1); ny=RI(0,VH-1); }while((BLOCKED.has(nx+','+ny) || (Math.abs(nx-nxt[0])<3&&Math.abs(ny-nxt[1])<3)) && guard++<50);
      let drops=3;
      while(drops-->0){
        let dx,dy,g2=0;
        do{ dx=RI(0,VW-1); dy=RI(0,VH-1); }while(BLOCKED.has(dx+','+dy)&&g2++<30);
        const dk=dx+','+dy;
        V.fur[dk]=(V.fur[dk]||0)+RI(1,3);
      }
      V.cat.x=nx; V.cat.y=ny;
      log(T.vPanic,'warn');
    }
    if(V.cat.awake>0) V.cat.awake--;
    V_render();
    if(V.battery<=0){ V.moving=false; V_finishCheck(); return; }
    setTimeout(step, 110);
  };
  step();
});
function V_finishCheck(){
  V_render();
  if(V.over) return;
  if(V.battery<=0){
    V.over=true;
    const score = Math.round(V.got);
    gameOver(T.vTitleShort, T.vEnd(score), score, V_start);
  }
}
$('vGiveUp').onclick = ()=>{
  if(V && !V.over){
    V.over=true;
    const score = Math.round(V.got);
    gameOver(T.vTitleShort, T.vAbandon(score), score, V_start);
  }
};

// советчик: одна строка «что сделать этим ходом»
function L_advice(){
  const full = L.boxes.findIndex(b=>b.load>=80);
  if(full>=0) return T.lAdvice.full(full);
  if(L.odor>=70 && L.vents>0) return T.lAdvice.vent;

  if(warn>=0) return T.lAdvice.warn(warn);

}
function L_render(){

function L_drawBox(i, b){
  const c=$('lc'+i); if(!c) return;
  const g=c.getContext('2d');
  g.clearRect(0,0,66,40);
  // box
  g.fillStyle='#2a3540'; g.fillRect(4,12,58,24);
  g.fillStyle='#1a222a'; g.fillRect(7,15,52,18);
  // litter
  g.fillStyle='#9a9078';
  const level = 15+18-Math.round(6);
  g.fillRect(7, 21, 52, 12);
  g.fillStyle='#b0a68c';
  for(let k=0;k<40;k++) g.fillRect(8+((k*7)%50), 22+((k*3)%10), 1,1);
  // clumps proportional to load
  const clumps = Math.round(clamp(b.load,0,100)/9);
  g.fillStyle='#4a3a24';
  for(let k=0;k<clumps;k++) g.fillRect(9+((k*11)%48), 23+((k*5)%9), 3,2);
  // stink waves
  if(b.load>=50){
    g.fillStyle= b.load>=80? '#ff5d4d':'#ffb54d';
    const ph=Math.floor(Date.now()/400)%2;
    [[16,8],[33,5],[50,8]].forEach(([wx,wy],j)=>{
      g.fillRect(wx, wy-(ph?1:0)+j%2, 1,3); g.fillRect(wx+2, wy-3-(ph?0:1)+j%2, 1,3);
    });
  }
  // cat used marker
  if(b.lastUsed){
    g.fillStyle='#c98f4e'; g.fillRect(48,2,10,7); g.fillRect(48,0,2,2); g.fillRect(55,0,2,2);
    g.fillStyle='#0a0f0a'; g.fillRect(50,4,1,1); g.fillRect(53,4,1,1);
  }
}
setInterval(()=>{ if(MODE==='litter'&&L&&!L.over) L.boxes.forEach((b,i)=>L_drawBox(i,b)); }, 400);
function L_act(kind, i){
  if(L.over) return;
  if(kind==='scoop'){ L.boxes[i].load=Math.max(0,L.boxes[i].load-40); log(T.lScooped(i),''); }
  else if(kind==='fresh'){ L.litter--; L.boxes[i].load=0; L.odor=Math.max(0,L.odor-8); log(T.lFreshed(i),'good'); }
  else if(kind==='vent'){ L.vents--; L.odor=Math.max(0,L.odor-15); log(T.lVented,'good'); }
  else log(T.lNothing,'sys');
  L_catsTurn();
}
$('lVent').onclick=()=>L_act('vent');
$('lWait').onclick=()=>L_act('wait');
function L_catsTurn(){
  log(T.lCatsTurn,'sys');
  L.boxes.forEach(b=>b.lastUsed=false);
  let dBypass=0, dStomach=0;
  // dino-режим: чем дольше держитесь, тем чаще ходят коты
  const uses = RI(1,2) + Math.floor((L.turn-1)/6);
  for(let u=0;u<uses;u++){
    const i=RI(0,2), box=L.boxes[i], cat=pick(T.catNames);
    if(box.load>80){
      dBypass+=8;
      log(T.lBypass(cat,i),'bad');
    } else {
      box.load+=RI(12,22); box.lastUsed=true;
      if(Math.random()<.35) log(T.lUsed(cat,i),'sys');
    }
  }
  const dBoxes = L.boxes.reduce((s,b)=> s + (b.load>50 ? (b.load-50)/30 : 0), 0);
  const dBase = 0.4;
  if(Math.random() < .1 + L.turn*.008){ dStomach=6; log(T.lStomach,'warn'); }
  const total = dBypass + dStomach + dBoxes + dBase;
  L.odor = clamp(L.odor + total, 0, 100);
  // разбор источников запаха — чтобы было понятно, откуда взялся прирост
  const parts=[];
  if(dBypass) parts.push('+'+dBypass+' '+T.lPartBypass);
  if(dBoxes>0.05) parts.push('+'+(Math.round(dBoxes*10)/10)+' '+T.lPartBoxes);
  if(dStomach) parts.push('+'+dStomach+' '+T.lPartStomach);
  parts.push('+'+dBase+' '+T.lPartBase);
  log(T.lDelta(Math.round(total*10)/10, parts.join(', ')), total>=8?'bad':total>=3?'warn':'sys');
  L.score += 10 + (L.odor<30?5:0);
  if(L.odor>=100){
    L.over=true; L_render();
    gameOver(T.lWinT, T.lEnd(L.turn, L.score), L.score, L_start);
    return;
  }
  L.turn++;
  if(L.turn%4===0 && L.vents<3){ L.vents++; log(T.lRegenVent,'good'); }
  if(L.turn%6===0 && L.litter<2){ L.litter++; log(T.lRegenLitter,'good'); }
  log(T.lTurnBegins(L.turn),'sys');
  L_render();
}

  for(let y=0;y<14;y++) for(let x=0;x<20;x++){
    tx2.fillStyle=(x+y)%2?'#15220f':'#121d0d';
    tx2.fillRect(x*10,y*10,10,10);
  }
  tx2.strokeStyle='#1c4027'; tx2.lineWidth=2; tx2.strokeRect(4,4,192,132);
  ST.stains.forEach(s=>{
    const r=clamp(s.size/2,3,16);
    // blob
    tx2.fillStyle=STYPE_HUE[s.key];
    for(let i=0;i<Math.round(r*3);i++){
      const a=i*2.399, rr=r*Math.sqrt((i%9)/9);
      tx2.fillRect(s.x+Math.cos(a)*rr, s.y+Math.sin(a)*rr*0.75, 2.5,2.5);
    }
    tx2.fillRect(s.x-1.5,s.y-1.5,3,3);
    // state ring
    let ring = s.enzyme>0 ? '#6fd8ff' : s.state==='fresh' ? '#5dff7e' : '#ff5d4d';
    const pulse = s.state==='fresh' && s.enzyme===0 && Math.floor(Date.now()/400)%2;
    tx2.strokeStyle=ring; tx2.lineWidth = pulse?2:1;
    tx2.beginPath(); tx2.arc(s.x, s.y, r+4, 0, 7); tx2.stroke();
    // countdown badge
    let badge = s.enzyme>0 ? String(s.enzyme) : s.state==='fresh' ? String(s.fresh) : '';
    if(badge){
      tx2.fillStyle='#0a0f0a'; tx2.fillRect(s.x+r, s.y-r-8, 9, 9);
      tx2.strokeStyle=ring; tx2.lineWidth=1; tx2.strokeRect(s.x+r+.5, s.y-r-7.5, 8, 8);
      tx2.fillStyle=ring; tx2.font='7px monospace'; tx2.fillText(badge, s.x+r+2.5, s.y-r-1);
    }
    // enzyme bubbles
    if(s.enzyme>0){
      tx2.fillStyle='#6fd8ff';
      const ph=Math.floor(Date.now()/300)%3;
      tx2.fillRect(s.x-4, s.y-r-2+ph, 2,2); tx2.fillRect(s.x+3, s.y-r-4+((ph+1)%3), 2,2);
    }
    // selection
    if(ST.sel===s.id){
      tx2.strokeStyle='#ffb54d'; tx2.lineWidth=1.5;
      tx2.strokeRect(s.x-r-7, s.y-r-7, r*2+14, r*2+14);
    }
  });
  if(!ST.stains.length){
    tx2.fillStyle='#2f7a45'; tx2.font='10px monospace';
    tx2.fillText(T.stClean, 40, 70);
  }
  // selected info panel
  const sel = ST.stains.find(s=>s.id===ST.sel);
  const info = $('stInfo');
  if(!sel){
    info.innerHTML = '<span style="color:var(--phos-dim)">'+T.stNone+'</span>';
  } else {
    let badge, rec;
    if(sel.enzyme>0){ badge='<span class="badge b-enz">'+T.stEnz(sel.enzyme)+'</span>'; rec=T.recEnz(sel.enzyme); }
    else if(sel.state==='fresh'){ badge='<span class="badge b-fresh">'+T.stFresh+'</span> <span style="color:var(--phos-dim)">('+T.stFreshIn(sel.fresh)+')</span>'; rec=T.recFresh; }
    else { badge='<span class="badge b-set">'+T.stSet+'</span>'; rec=T.recSet; }
    info.innerHTML = '<b style="color:'+STYPE_HUE[sel.key]+'">■</b> <b>'+T.stTypes[sel.key]+'</b><br>'+
      badge+'<br>'+T.stSize+': '+Math.round(sel.size)+'<br>'+
      '<span class="rec">'+T.stRec+rec+'</span>';
  }
  $('tBlot').disabled = ST.over || !sel || ST.ap<1 || sel.state!=='fresh' || sel.enzyme>0;
  $('tEnzyme').disabled = ST.over || !sel || ST.ap<1 || sel.enzyme>0;
  $('tScrub').disabled = ST.over || !sel || ST.ap<1;
  $('tEnd').disabled = ST.over;
}
setInterval(()=>{ if(MODE==='stains'&&ST&&!ST.over) T_render(); }, 400);
tcv.addEventListener('click', e=>{
  if(MODE!=='stains'||!ST||ST.over) return;
  const r = tcv.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*200, my=(e.clientY-r.top)/r.height*140;
  let best=null, bd=1e9;
  ST.stains.forEach(s=>{
    const d=Math.hypot(s.x-mx, s.y-my);
    if(d<bd && d < clamp(s.size/2,3,16)+9){ bd=d; best=s; }
  });
  if(best){ ST.sel=best.id; T_render(); }
});
function T_remove(s, how){
  ST.stains = ST.stains.filter(x=>x.id!==s.id);
  if(ST.sel===s.id) ST.sel = ST.stains.length? ST.stains[0].id : null;
  ST.cleaned++; ST.score += 25;
  log(T.stGone(T.stTypes[s.key], how),'good');
}
$('tBlot').onclick=()=>{
  const s=ST.stains.find(x=>x.id===ST.sel); if(!s||ST.ap<1) return;
  ST.ap--;
  s.size*=0.45;
  if(s.size<4) T_remove(s,T.howBlot);
  else log(T.stBlotted(Math.round(s.size)),'');
  T_render();
};
$('tEnzyme').onclick=()=>{
  const s=ST.stains.find(x=>x.id===ST.sel); if(!s||ST.ap<1) return;
  ST.ap--;
  s.enzyme=2;
  log(T.stEnzApplied(T.stTypes[s.key]),'sys');
  T_render();
};
$('tScrub').onclick=()=>{
  const s=ST.stains.find(x=>x.id===ST.sel); if(!s||ST.ap<1) return;
  ST.ap--;
  if(s.enzyme>0){ s.enzyme=0; log(T.stScrubEnz,'bad'); }
  else if(s.state==='fresh'){ s.size*=0.7; if(s.size<4) T_remove(s,T.howScrub); else log(T.stScrubFresh(Math.round(s.size)),''); }
  else { s.size*=1.4; log(T.stScrubSet(Math.round(s.size)),'bad'); }
  T_render();
};
$('tEnd').onclick=()=>{
  if(ST.over) return;
  ST.stains.slice().forEach(s=>{
    if(s.enzyme>0){
      s.enzyme--;
      if(s.enzyme===0) T_remove(s,T.howEnzyme);
    } else if(s.state==='fresh'){
      s.fresh--;
      if(s.fresh<=0){ s.state='set-in'; log(T.stSetIn(T.stTypes[s.key]),'warn'); }
    }
  });
  ST.score += 5;
  if(ST.stains.length>=6){
    ST.over=true; T_render();
    gameOver(T.stWinT, T.stEnd(ST.round, ST.cleaned, ST.score), ST.score, T_start);
    return;
  }
  ST.round++;
  ST.ap=2;
  // dino-режим: шанс нового пятна растёт с раундом, после 6-го возможно второе за раунд
  if(Math.random() < Math.min(.95, .55 + ST.round*.03)){
    T_spawn(); log(T.stNew(T.stTypes[ST.stains[ST.stains.length-1].key]),'warn');
  }
  if(ST.round>6 && Math.random() < (ST.round-6)*.05){
    T_spawn(); log(T.stNew(T.stTypes[ST.stains[ST.stains.length-1].key]),'warn');
  }
  if(ST.round%5===0) log(T.stFaster,'warn');
  log(T.stRound(ST.round),'sys');
  T_render();
};

// ================= COUCH RESCUE =================
const ccv = $('ccv'), cx2 = ccv.getContext('2d');
let C = null;
const CSURF_HUE = {cushion:'#8a6a3a', rug:'#5a3a6a', corner:'#3a5a7a'};
function C_zonePoint(surf){
  if(surf==='cushion') return {x:R(52,148), y:R(34,72)};
  if(surf==='rug') return {x:R(20,180), y:R(100,128)};
  return Math.random()<.5 ? {x:R(28,46), y:R(34,72)} : {x:R(154,172), y:R(34,72)};
}
function C_spawn(){
  const surf = pick(['cushion','cushion','rug','corner']);
  const p = C_zonePoint(surf);
  C.patches.push({id:C.nextId++, surf, size:R(9,16), x:p.x, y:p.y});
}
function C_start(){
  C = { round:1, ap:2, patches:[], sel:null, over:false, cleaned:0, nextId:1, score:0 };
  C_spawn(); C_spawn();
  $('pCSel').textContent=T.cSel; $('pCManual').textContent=T.cManualT; $('cManual').innerHTML=T.cManual;
  $('cRoll').textContent=T.cRoll; $('cRake').textContent=T.cRake; $('cBlade').textContent=T.cBlade; $('cEnd').textContent=T.cEndBtn;
  showScreen('couchScreen');
  modal(T.cTitle, T.cIntro, [[T.cGrab, ()=>{ C_render(); log(T.cStarted,'sys'); }]]);
}
function C_hud(){
  const pips = '●'.repeat(C.ap)+'○'.repeat(2-C.ap);
  hud('<span>'+T.round+' <b>'+C.round+'</b></span>'+
      '<span class="amber">'+T.actionsLeft+' <b>'+pips+'</b></span>'+
      '<span>FUR <b>'+C.patches.length+'</b> / 8</span>'+
      '<span>'+T.score+' <b>'+C.score+'</b></span>');
}
function C_render(){
  C_hud();
  // room floor
  cx2.fillStyle='#121d0d'; cx2.fillRect(0,0,200,140);
  // rug
  for(let y=9;y<14;y++) for(let x=1;x<19;x++){
    cx2.fillStyle=(x+y)%2?'#241733':'#1d122b'; cx2.fillRect(x*10,y*10,10,10);
  }
  cx2.strokeStyle='#3a2a52'; cx2.lineWidth=2; cx2.strokeRect(10,90,180,44);
  // couch: back, arms, cushions
  cx2.fillStyle='#4a3a20'; cx2.fillRect(24,16,152,18);
  cx2.fillStyle='#5a4728'; cx2.fillRect(24,30,26,48); cx2.fillRect(150,30,26,48);
  cx2.fillStyle='#6a5530'; cx2.fillRect(50,34,50,44); cx2.fillRect(100,34,50,44);
  cx2.strokeStyle='#2e2412'; cx2.lineWidth=2;
  cx2.strokeRect(24,16,152,62); cx2.beginPath();
  cx2.moveTo(100,34); cx2.lineTo(100,78); cx2.stroke();
  // patches
  C.patches.forEach(p=>{
    const r=clamp(p.size/2,3,14);
    cx2.strokeStyle=CSURF_HUE[p.surf]==='#8a6a3a'?'#d8c9a0':'#c9c9c9';
    cx2.lineWidth=1;
    for(let i=0;i<Math.round(r*2.5);i++){
      const a=i*2.399, rr=r*Math.sqrt((i%9)/9);
      const px=p.x+Math.cos(a)*rr, py=p.y+Math.sin(a)*rr*0.75;
      cx2.beginPath(); cx2.moveTo(px-1.6,py+1.2); cx2.quadraticCurveTo(px,py-1.6,px+1.6,py+.8); cx2.stroke();
    }
    let ring = CSURF_HUE[p.surf];
    cx2.strokeStyle=ring; cx2.lineWidth=1;
    cx2.beginPath(); cx2.arc(p.x,p.y,r+4,0,7); cx2.stroke();
    if(C.sel===p.id){
      cx2.strokeStyle='#ffb54d'; cx2.lineWidth=1.5;
      cx2.strokeRect(p.x-r-7,p.y-r-7,r*2+14,r*2+14);
    }
  });
  if(!C.patches.length){
    cx2.fillStyle='#2f7a45'; cx2.font='10px monospace';
    cx2.fillText(T.cCleanTxt, 30, 70);
  }
  const sel = C.patches.find(p=>p.id===C.sel);
  const info = $('cInfo');
  if(!sel) info.innerHTML = '<span style="color:var(--phos-dim)">'+T.cNone+'</span>';
  else info.innerHTML = '<b style="color:'+CSURF_HUE[sel.surf]+'">■</b> <b>'+T.cSurf[sel.surf]+'</b><br>'+
      T.cSizeTxt+': '+Math.round(sel.size)+'<br>'+
      '<span class="rec">'+T.cRecTxt+T.cRec[sel.surf]+'</span>';
  const dis = C.over || !sel || C.ap<1;
  $('cRoll').disabled=dis; $('cRake').disabled=dis; $('cBlade').disabled=dis;
  $('cEnd').disabled = C.over;
}
setInterval(()=>{ if(MODE==='couch'&&C&&!C.over) C_render(); }, 400);
ccv.addEventListener('click', e=>{
  if(MODE!=='couch'||!C||C.over) return;
  const r = ccv.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*200, my=(e.clientY-r.top)/r.height*140;
  let best=null, bd=1e9;
  C.patches.forEach(p=>{
    const d=Math.hypot(p.x-mx,p.y-my);
    if(d<bd && d<clamp(p.size/2,3,14)+9){ bd=d; best=p; }
  });
  if(best){ C.sel=best.id; C_render(); }
});
function C_remove(p, tool){
  C.patches = C.patches.filter(x=>x.id!==p.id);
  if(C.sel===p.id) C.sel = C.patches.length? C.patches[0].id : null;
  C.cleaned++; C.score += 20;
  log(T.cCleared(T.cSurf[p.surf], tool),'good');
}
function C_tool(tool){
  const p=C.patches.find(x=>x.id===C.sel); if(!p||C.ap<1) return;
  C.ap--;
  const right = (tool==='roll'&&p.surf==='cushion')||(tool==='rake'&&p.surf==='rug')||(tool==='blade'&&p.surf==='corner');
  const names={roll:T.cRoll,rake:T.cRake,blade:T.cBlade};
  if(right){ C_remove(p, names[tool]); }
  else if(tool==='rake'&&p.surf!=='rug'){
    log(T.cScatter,'bad'); C_spawn();
    p.size*=0.85;
  } else if(tool==='roll'&&p.surf==='rug'){
    log(T.cFuzz,'bad'); p.size*=0.9;
  } else {
    p.size*=0.65;
    if(p.size<4) C_remove(p, names[tool]);
    else log(T.cWeak(Math.round(p.size)),'warn');
  }
  C_render();
}
$('cRoll').onclick=()=>C_tool('roll');
$('cRake').onclick=()=>C_tool('rake');
$('cBlade').onclick=()=>C_tool('blade');
$('cEnd').onclick=()=>{
  if(C.over) return;
  C.score += 5;
  if(C.patches.length>=8){
    C.over=true; C_render();
    gameOver(T.cWinT, T.cEnd(C.round, C.cleaned, C.score), C.score, C_start);
    return;
  }
  C.round++; C.ap=2;
  if(Math.random() < Math.min(.95, .6 + C.round*.03)){
    C_spawn(); log(T.cNew(T.cSurf[C.patches[C.patches.length-1].surf]),'warn');
  }
  if(C.round>5 && Math.random() < (C.round-5)*.06){
    C_spawn(); log(T.cNew(T.cSurf[C.patches[C.patches.length-1].surf]),'warn');
  }
  if(C.round%5===0) log(T.cFaster,'warn');
  log(T.cRoundN(C.round),'sys');
  C_render();
};

// ================= NAIL TRIM =================
const ncv = $('ncv'), nx2 = ncv.getContext('2d');
let N = null;
function N_newNail(){
  const dark = Math.random()<.35;
  return { total:RI(6,9), safe:RI(2,5), ground:0, dark, revealed:false, done:false };
}
function N_newDog(){
  N.dog = { name:pick(T.dogNames), pat:clamp(90 - N.dogsDone*6, 45, 90) };
  N.nails = Array.from({length:8}, N_newNail);
  N.idx = 0; N.heat = 0;
  $('nDogName').textContent = N.dog.name;
  log(N.dogsDone===0 ? T.nStarted : '', 'sys');
}
function N_start(){
  N = { dog:null, nails:[], idx:0, heat:0, strikes:0, score:0, dogsDone:0, over:false };
  $('pNDog').textContent=T.nDog; $('kNPat').textContent=T.nPatT; $('kNHeat').textContent=T.nHeatT;
  $('kNNail').textContent=T.nNailT; $('kNStrikes').textContent=T.nStrikesT;
  $('pNManual').textContent=T.nManualT; $('nManual').innerHTML=T.nManual;
  $('nGrind').textContent=T.nGrindB; $('nCheck').textContent=T.nCheckB;
  $('nSoothe').textContent=T.nSootheB; $('nNext').textContent=T.nNextB;
  N_newDog();
  showScreen('nailScreen');
  modal(T.nTitle, T.nIntro, [[T.nStart, ()=>{ N_render(); }]]);
}
function N_hud(){
  hud('<span>'+T.score+' <b>'+N.score+'</b></span>'+
      '<span class="amber">'+T.nStrikesT+' <b>'+'✖'.repeat(N.strikes)+'○'.repeat(3-N.strikes)+'</b></span>');
}
function N_render(){
  N_hud();
  const nail = N.nails[N.idx];
  // panel
  $('nPat').textContent = Math.round(N.dog.pat);
  $('mNPat').style.width = clamp(N.dog.pat,0,100)+'%';
  $('mNPatWrap').className = 'meter'+(N.dog.pat<30?' bad':N.dog.pat<55?' warn':'');
  $('nHeat').textContent = N.heat>=3 ? '🔥' : N.heat;
  $('mNHeat').style.width = clamp(N.heat/4*100,0,100)+'%';
  $('mNHeatWrap').className = 'meter'+(N.heat>=3?' bad':N.heat===2?' warn':'');
  $('nNail').textContent = T.nNailN(N.idx+1, 8) + (nail.dark?' '+T.nDark:'');
  $('nStrikes').textContent = N.strikes+' / 3';
  // canvas: paw + nail cross-section
  nx2.fillStyle='#0d150e'; nx2.fillRect(0,0,120,100);
  // paw
  nx2.fillStyle='#8a5a2a';
  nx2.fillRect(8,64,40,26);
  [12,22,32].forEach(x=>nx2.fillRect(x,56,8,10));
  nx2.fillStyle='#c9a05e'; nx2.fillRect(40,60,12,12);
  // nail zoom: segments from tip (right) to base (left)
  const nsegs = nail.total, segW = 8, x0 = 110 - nsegs*segW, y0=20;
  nx2.fillStyle='#2f7a45'; nx2.font='7px monospace';
  for(let i=0;i<nsegs;i++){
    const fromTip = nsegs-1-i;
    const grounded = fromTip < nail.ground;
    let col;
    if(grounded) col = '#1c4027';
    else col = nail.dark ? '#3b3f46' : '#d8c9a0';
    nx2.fillStyle = col;
    nx2.fillRect(x0+i*segW, y0, segW-1, 16);
  }
  // quick zone (revealed only after LED check on light nails)
  if(nail.revealed && !nail.dark){
    const qsegs = nail.total - nail.safe;
    nx2.fillStyle='rgba(255,93,77,.55)';
    nx2.fillRect(x0, y0, qsegs*segW-1, 16);
  }
  nx2.strokeStyle='#2f7a45'; nx2.lineWidth=1; nx2.strokeRect(x0-1, y0-1, nsegs*segW+1, 18);
  nx2.fillStyle='#5dff7e';
  nx2.fillText('◂ '+(LANG==='ru'?'ОСНОВАНИЕ':'BASE'), 6, y0+28);
  nx2.fillText((LANG==='ru'?'КОНЧИК':'TIP')+' ▸', 92, y0+38);
  if(nail.revealed && !nail.dark){
    nx2.fillStyle='#ff5d4d'; nx2.fillText(LANG==='ru'?'пульпа':'quick', x0, y0-4);
  }
  // buttons
  $('nGrind').disabled = N.over || nail.done;
  $('nCheck').disabled = N.over || nail.done || nail.revealed;
  $('nSoothe').disabled = N.over;
  $('nNext').disabled = N.over;
}
function N_spendPat(v){
  N.dog.pat -= v;
  if(N.dog.pat<=0){
    log(T.nDogLeft(N.dog.name),'warn');
    N.dogsDone += 0; N_newDog(); N_render();
    return true;
  }
  return false;
}
$('nGrind').onclick=()=>{
  const nail=N.nails[N.idx]; if(nail.done||N.over) return;
  // hot bit sting
  if(N.heat>=3 && Math.random()<.35){
    log(T.nHotSting,'bad'); N.heat=0;
    if(N_spendPat(10)) return;
    N_render(); return;
  }
  nail.ground++; N.heat++;
  const remainingSafe = nail.safe - nail.ground;
  if(remainingSafe < 0){
    // hit the quick
    N.strikes++; nail.done=true; N.heat=0;
    log(T.nYelp,'bad');
    if(N_spendPat(15)) { if(N.strikes<3) return; }
    if(N.strikes>=3){
      N.over=true; N_render();
      gameOver(T.nWinT, T.nEnd(N.dogsDone, N.score), N.score, N_start);
      return;
    }
  } else {
    N.score += 10;
    log(T.nPass, 'sys');
    if(N.heat>=3) log(T.nHot,'warn');
    if(N_spendPat(3)) return;
  }
  N_render();
};
$('nCheck').onclick=()=>{
  const nail=N.nails[N.idx]; if(nail.done||nail.revealed||N.over) return;
  if(N_spendPat(4)) return;
  if(nail.dark){ log(T.nNoLed,'warn'); nail.revealed=true; }
  else { nail.revealed=true; log(T.nSafe(Math.max(0,nail.safe-nail.ground)),'good'); }
  N_render();
};
$('nSoothe').onclick=()=>{
  if(N.over) return;
  N.heat=0; N.dog.pat = clamp(N.dog.pat+6, 0, 100);
  log(T.nCooled,'good');
  N_render();
};
$('nNext').onclick=()=>{
  const nail=N.nails[N.idx]; if(N.over) return;
  if(!nail.done){
    if(nail.ground===0) log(T.nZero,'sys');
    else if(nail.ground===nail.safe){ N.score+=40; log(T.nPerfect,'good'); }
    else { N.score+=15; log(T.nBanked,'good'); }
    nail.done=true;
  }
  // advance
  const next = N.nails.findIndex(x=>!x.done);
  if(next===-1){
    N.dogsDone++; N.score+=100;
    log(T.nDogDone(N.dog.name),'good');
    N_newDog();
  } else N.idx = next;
  N.heat=0;
  N_render();
};

  }]]);
}
function B_hud(){
  hud('<span>'+T.score+' <b>'+Math.round(B.score)+'</b></span>'+
      '<span class="amber">'+T.bStrikesT+' <b>'+'✖'.repeat(B.strikes)+'○'.repeat(3-B.strikes)+'</b></span>');
}
function B_tick(){
  if(!B||B.over||modalOpen()) return;
  B.t += 100; B.score += 0.1;
  B.nextSpawn -= 100;
  if(B.nextSpawn<=0){
    const max = RI(2600, 4200);
    B.dogs.push({ id:B.t, name:pick(T.dogNames), x:R(60,150), t:max, max,
                  hue:pick(['#8a5a2a','#c9a05e','#4d4d4d','#b06a3a']) });
    B.spawnGap = Math.max(1700, B.spawnGap - 90);
    B.nextSpawn = B.spawnGap;
    if(B.spawnGap<3400 && !B.f1){ B.f1=true; log(T.bFaster,'warn'); }
    if(B.spawnGap<2400 && !B.f2){ B.f2=true; log(T.bFaster,'warn'); }
  }
  B.dogs.slice().forEach(d=>{
    d.t -= 100;
    if(d.t<=0){
      B.dogs = B.dogs.filter(x=>x!==d);
      B.strikes++;
      log(T.bJump(d.name),'bad');
      if(B.strikes>=3){
        B.over=true; clearInterval(B_timer); B_timer=null;
        B_render();
        gameOver(T.bWinT, T.bEnd(B.saved, Math.round(B.score)), Math.round(B.score), B_start);
      }
    }
  });
  B_render();
}
function B_render(){
  if(!B) return;
  B_hud();
  $('bStrikes').textContent = B.strikes+' / 3';
  // room
  bx2.fillStyle='#121d0d'; bx2.fillRect(0,0,200,140);
  bx2.fillStyle='#0d150e'; bx2.fillRect(0,120,200,20);
  // tall bed
  bx2.fillStyle='#4a3a20'; bx2.fillRect(40,60,120,20);   // frame
  bx2.fillStyle='#6a5530'; bx2.fillRect(40,48,120,14);   // mattress
  bx2.fillStyle='#8a7a50'; bx2.fillRect(44,44,44,8);     // pillow
  bx2.fillStyle='#4a3a20'; bx2.fillRect(44,80,8,40); bx2.fillRect(148,80,8,40); // legs
  // stairs at right side of bed
  bx2.fillStyle='#6b7280';
  bx2.fillRect(160,92,14,28); bx2.fillRect(174,106,14,14);
  bx2.fillStyle='#9ca3af'; bx2.fillRect(160,92,14,3); bx2.fillRect(174,106,14,3);
  bx2.strokeStyle='#3f4854'; bx2.lineWidth=1; bx2.strokeRect(160,92,28,28);
  // dogs on the bed
  B.dogs.forEach(d=>{
    const y=36;
    // body
    bx2.fillStyle=d.hue;
    bx2.fillRect(d.x-7,y,14,8);
    bx2.fillRect(d.x+5,y-5,6,6);   // head
    bx2.fillRect(d.x-9,y+1,3,4);   // tail
    bx2.fillStyle='#0a0f0a'; bx2.fillRect(d.x+8,y-4,2,2); // eye
    // countdown ring
    const frac = clamp(d.t/d.max,0,1);
    bx2.strokeStyle = frac>.5?'#5dff7e':frac>.25?'#ffb54d':'#ff5d4d';
    bx2.lineWidth=2;
    bx2.beginPath(); bx2.arc(d.x, y+2, 12, -Math.PI/2, -Math.PI/2 + Math.PI*2*frac); bx2.stroke();
  });
}
bcv.addEventListener('click', e=>{
  if(MODE!=='bedtime'||!B||B.over) return;
  const r = bcv.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*200, my=(e.clientY-r.top)/r.height*140;
  let best=null, bd=1e9;
  B.dogs.forEach(d=>{
    const dd=Math.hypot(d.x-mx, 38-my);
    if(dd<bd && dd<16){ bd=dd; best=d; }
  });
  if(best){
    B.dogs = B.dogs.filter(x=>x!==best);
    B.saved++; B.score += 15;
    log(T.bSaved(best.name),'good');
    B_render();
  }
});
$('bBedEnd').onclick=()=>{
  if(!B||B.over) return;
  B.over=true; clearInterval(B_timer); B_timer=null;
  const s=Math.round(B.score);
  log(T.finalScore(s),'good');
  LB_submit('bedtime', s);
  modal(T.bWinT, T.bGaveUp(s), [[T.again, B_start, 'amber'], [T.back, contracts, 'ghost']]);
};

// ================= BOOT =================
$('bContracts').onclick = contracts;
(function(){
  const m = new URLSearchParams(location.search).get('mode');
  if(m && ['cats','dogs','vacuum','litter','stains','couch','nails','bedtime'].includes(m)) startMode(m);
  else contracts();
})();
</script>
