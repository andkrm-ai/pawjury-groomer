<html lang="ru">
<head>

<title>Wasteland Groomer — ретро-игра о питомцах пустоши | PawJury</title>
<meta name="description" content="Бесплатная ретро-игра в браузере: пять контрактов по уходу за питомцами пустоши — вычёсывайте котов и собак, пылесосьте берлогу, держите запах лотков под контролем и побеждайте пятна энзимами.">
<link rel="canonical" href="https://andkrm-ai.github.io/pawjury-groomer/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://andkrm-ai.github.io/pawjury-groomer/">
<meta property="og:site_name" content="PawJury">
<meta property="og:title" content="Wasteland Groomer — ретро-игра о питомцах пустоши">
<meta property="og:description" content="Пять контрактов в пустоши: грумьте котов и собак, пылесосьте шерсть, контролируйте запах лотков, побеждайте пятна. Бесплатно в браузере.">
<meta name="twitter:card" content="summary">
<style>
  :root{
    --bg:#0a0f0a; --panel:#111b12; --panel2:#0d150e;
    --phos:#5dff7e; --phos-dim:#2f7a45; --phos-faint:#1c4027;
    --amber:#ffb54d; --red:#ff5d4d; --ink:#bfffd0;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Courier New",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--mono);
    font-size:14px; line-height:1.45; min-height:100vh;
    background-image:radial-gradient(ellipse at 50% 20%, #0e1a0f 0%, var(--bg) 70%);
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:50;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  .frame{max-width:1080px;margin:0 auto;padding:14px 14px 40px}
  header{
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;
    border:2px solid var(--phos-dim);background:var(--panel);padding:10px 14px;margin-bottom:10px;
    box-shadow:0 0 18px rgba(93,255,126,.07) inset;
  }
  h1{margin:0;font-size:17px;letter-spacing:.22em;color:var(--phos);text-shadow:0 0 8px rgba(93,255,126,.55);font-weight:700}
  h1 small{color:var(--phos-dim);letter-spacing:.1em;font-weight:400}
  .hud{display:flex;gap:16px;flex-wrap:wrap;font-variant-numeric:tabular-nums}
  .hud b{color:var(--phos);text-shadow:0 0 6px rgba(93,255,126,.45)}
  .hud .amber b{color:var(--amber);text-shadow:0 0 6px rgba(255,181,77,.4)}
  main{display:grid;grid-template-columns:1fr 320px;gap:10px}
  @media(max-width:820px){main{grid-template-columns:1fr}}
  .panel{border:2px solid var(--phos-dim);background:var(--panel);padding:10px}
  .panel h2{
    margin:-10px -10px 8px;padding:5px 10px;font-size:11px;letter-spacing:.3em;font-weight:700;
    color:var(--bg);background:var(--phos-dim);text-transform:uppercase;
  }
  .viewport{position:relative;display:flex;align-items:center;justify-content:center;background:var(--panel2);min-height:380px}
  canvas{image-rendering:pixelated;width:min(100%,440px)}
  #vcv,#tcv{width:min(100%,660px);cursor:crosshair}
  .catname{
    position:absolute;top:8px;left:10px;color:var(--phos);letter-spacing:.15em;font-size:13px;
    text-shadow:0 0 8px rgba(93,255,126,.5)
  }
  .floorfur{position:absolute;bottom:8px;right:10px;color:var(--phos-dim);font-size:12px}
  .meter{height:10px;background:var(--phos-faint);border:1px solid var(--phos-dim);margin:2px 0 8px;position:relative}
  .meter i{display:block;height:100%;background:var(--phos);box-shadow:0 0 8px rgba(93,255,126,.5)}
  .meter.warn i{background:var(--amber);box-shadow:0 0 8px rgba(255,181,77,.5)}
  .meter.bad i{background:var(--red);box-shadow:0 0 8px rgba(255,93,77,.5)}
  .meter .mark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--amber);box-shadow:0 0 6px rgba(255,181,77,.6)}
  .kv{display:flex;justify-content:space-between;gap:8px}
  .kv span:last-child{color:var(--phos)}
  .side{display:flex;flex-direction:column;gap:10px}
  .tools{display:flex;flex-direction:column;gap:6px}
  .tool{border:1px solid var(--phos-faint);padding:6px 8px;cursor:pointer;background:var(--panel2)}
  .tool:hover{border-color:var(--phos-dim)}
  .tool.eq{border-color:var(--phos);box-shadow:0 0 10px rgba(93,255,126,.2)}
  .tool .tname{color:var(--phos);font-size:13px}
  .tool .tdur{font-size:11px;color:var(--phos-dim)}
  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  button{
    font-family:var(--mono);font-size:13px;letter-spacing:.08em;text-transform:uppercase;
    background:var(--panel2);color:var(--phos);border:2px solid var(--phos-dim);
    padding:9px 14px;cursor:pointer;
  }
  button:hover:not(:disabled){border-color:var(--phos);box-shadow:0 0 12px rgba(93,255,126,.25);text-shadow:0 0 6px rgba(93,255,126,.5)}
  button:disabled{opacity:.35;cursor:default}
  button:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  button.amber{color:var(--amber);border-color:#8a6226}
  button.amber:hover:not(:disabled){border-color:var(--amber);box-shadow:0 0 12px rgba(255,181,77,.25)}
  button.ghost{border-color:var(--phos-faint);color:var(--phos-dim);padding:6px 10px;font-size:11px}
  .hint{font-size:12px;color:var(--phos-dim);align-self:center}
  .log{
    margin-top:10px;border:2px solid var(--phos-dim);background:#070c08;
    height:180px;overflow-y:auto;padding:8px 10px;font-size:13px;
  }
  .log p{margin:0 0 4px}
  .log .sys{color:var(--phos-dim)}
  .log .good{color:var(--phos)}
  .log .warn{color:var(--amber)}
  .log .bad{color:var(--red)}
  .log .quote{color:#8fd8a5;font-style:italic}
  .overlay{
    position:fixed;inset:0;background:rgba(4,8,5,.88);z-index:60;display:flex;align-items:center;justify-content:center;padding:16px;
  }
  .modal{
    max-width:640px;width:100%;max-height:90vh;overflow-y:auto;
    border:2px solid var(--phos);background:var(--panel);padding:18px 20px;
    box-shadow:0 0 40px rgba(93,255,126,.15);
  }
  .modal h2{color:var(--phos);letter-spacing:.2em;font-size:15px;margin:0 0 10px;text-shadow:0 0 8px rgba(93,255,126,.5)}
  .modal p{margin:0 0 10px;max-width:62ch}
  .shopitem{display:flex;justify-content:space-between;gap:10px;align-items:center;border-top:1px solid var(--phos-faint);padding:8px 0}
  .shopitem .sdesc{font-size:12px;color:var(--phos-dim);max-width:46ch}
  .shopitem .sname{color:var(--phos)}
  .shopitem .price{color:var(--amber);white-space:nowrap;font-variant-numeric:tabular-nums}
  .fake{border-left:3px solid var(--amber);padding-left:8px}
  .hidden{display:none}
  .win{color:var(--amber);text-shadow:0 0 10px rgba(255,181,77,.6)}
  footer{margin-top:14px;font-size:11px;color:var(--phos-dim);max-width:70ch}
  footer a{color:var(--phos-dim)}
  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
  .contract{
    border:2px solid var(--phos-dim);background:var(--panel);padding:14px;cursor:pointer;text-align:left;
    display:flex;flex-direction:column;gap:6px;
  }
  .contract:hover{border-color:var(--phos);box-shadow:0 0 16px rgba(93,255,126,.2)}
  .contract .cno{font-size:10px;letter-spacing:.3em;color:var(--phos-dim)}
  .contract .ctitle{color:var(--phos);font-size:15px;letter-spacing:.12em;text-transform:uppercase;text-shadow:0 0 6px rgba(93,255,126,.4)}
  .contract .cdesc{font-size:12px;color:var(--ink);opacity:.85;text-transform:none;letter-spacing:0}
  .boardhead{margin:6px 0 12px;color:var(--phos-dim);max-width:70ch}
  /* litter */
  .lboxes{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px}
  .lbox{border:2px solid var(--phos-dim);background:var(--panel);padding:10px}
  .lbox h3{margin:0 0 6px;font-size:12px;letter-spacing:.2em;color:var(--phos)}
  .lbox canvas{width:100%;max-width:220px;display:block;margin:0 auto 6px}
  .lbox .labs{font-size:11px;color:var(--phos-dim);min-height:16px}
  /* stains */
  .stinfo{font-size:12px;line-height:1.55}
  .stinfo b{color:var(--phos)}
  .stinfo .rec{color:var(--amber)}
  .badge{display:inline-block;padding:0 6px;border:1px solid;font-size:10px;letter-spacing:.15em;text-transform:uppercase}
  .b-fresh{color:var(--phos);border-color:var(--phos)}
  .b-set{color:var(--red);border-color:var(--red)}
  .b-enz{color:#6fd8ff;border-color:#6fd8ff}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="frame">
  <header>
    <h1>PAWJURY <small>// WASTELAND GROOMER v0.3</small></h1>
    <div class="hud" id="hud"></div>
    <button class="ghost" id="bContracts">◂ Contracts</button>
  </header>

  <!-- CONTRACTS BOARD -->
  <section id="selScreen">
    <p class="boardhead" id="boardhead"></p>
    <div class="board" id="board"></div>
  </section>

  <!-- GROOMER -->
  <section id="groomScreen" class="hidden">
    <main>
      <section class="panel viewport">
        <div class="catname" id="catName">—</div>
        <canvas id="cv" width="96" height="80" aria-label="Pixel pet"></canvas>
        <div class="floorfur" id="floorFur"></div>
      </section>
      <div class="side">
        <section class="panel">
          <h2 id="pClient"></h2>
          <div class="kv"><span id="kFur"></span><span id="cFur">—</span></div>
          <div class="meter" id="mFurWrap"><i id="mFur" style="width:100%"></i></div>
          <div class="kv"><span id="kPat"></span><span id="cPat">—</span></div>
          <div class="meter" id="mPatWrap"><i id="mPat" style="width:100%"></i></div>
          <div class="kv"><span id="kTrust"></span><span id="cTrust">—</span></div>
          <div class="meter" id="mTrustWrap"><i id="mTrust" style="width:100%"></i></div>
          <div class="kv"><span id="kCoat"></span><span id="cCoat">—</span></div>
          <div class="kv"><span id="kTemp"></span><span id="cTemp">—</span></div>
          <div class="kv"><span id="kMats"></span><span id="cMats">—</span></div>
        </section>
        <section class="panel">
          <h2 id="pTools"></h2>
          <div class="tools" id="toolList"></div>
        </section>
      </div>
    </main>
    <div class="actions">
      <button id="bBrush"></button>
      <button id="bHand"></button>
      <button id="bTreat" class="amber"></button>
      <button id="bVac" class="hidden"></button>
      <button id="bNext"></button>
      <button id="bEndDay" class="amber"></button>
    </div>
  </section>

  <!-- VACUUM RUN -->
  <section id="vacScreen" class="hidden">
    <section class="panel" style="margin-bottom:10px">
      <div class="kv"><span id="kBat"></span><span id="vBat">100%</span></div>
      <div class="meter" id="mBatWrap"><i id="mBat" style="width:100%"></i></div>
      <div class="kv"><span id="kGot"></span><span id="vGot">0 g</span></div>
      <div class="meter" id="mGotWrap"><i id="mGot" style="width:0%"></i></div>
    </section>
    <section class="panel viewport" style="min-height:300px">
      <canvas id="vcv" width="200" height="140" aria-label="Room map"></canvas>
    </section>
    <div class="actions">
      <span class="hint" id="vHint"></span>
      <button id="vGiveUp" class="amber"></button>
    </div>
  </section>

  <!-- ODOR CONTROL -->
  <section id="litScreen" class="hidden">
    <section class="panel" style="margin-bottom:10px">
      <h2 id="pAir"></h2>
      <div class="kv"><span id="kOdor"></span><span id="lOdor">0 / 100</span></div>
      <div class="meter" id="mOdorWrap"><i id="mOdor" style="width:0%"></i><span class="mark" style="left:30%"></span></div>
      <div class="kv"><span id="kGuests"></span><span id="lTurns">—</span></div>
      <div class="hint" id="lHint" style="margin-top:6px"></div>
    </section>
    <div class="lboxes" id="lBoxes"></div>
    <div class="actions">
      <button id="lVent"></button>
      <button id="lWait"></button>
    </div>
  </section>

  <!-- STAIN RESPONSE -->
  <section id="stainScreen" class="hidden">
    <main>
      <section class="panel viewport" style="min-height:300px">
        <canvas id="tcv" width="200" height="140" aria-label="Carpet map"></canvas>
      </section>
      <div class="side">
        <section class="panel">
          <h2 id="pSel"></h2>
          <div class="stinfo" id="stInfo"></div>
        </section>
        <section class="panel">
          <h2 id="pManual"></h2>
          <div class="stinfo" id="stManual"></div>
        </section>
      </div>
    </main>
    <div class="actions">
      <button id="tBlot"></button>
      <button id="tEnzyme"></button>
      <button id="tScrub" class="amber"></button>
      <button id="tEnd"></button>
    </div>
  </section>

  <div class="log" id="log" aria-live="polite"></div>

  <footer id="foot"></footer>
</div>

<!-- GENERIC MODAL -->
<div class="overlay hidden" id="ovM">
  <div class="modal">
    <h2 id="mTitle"></h2>
    <div id="mBody"></div>
    <div class="actions" id="mBtns"></div>
  </div>
</div>

const TOOL_STATS = {

  safari:{price:12,dur:70}, rubber:{price:10,dur:60}, dual:{price:11,dur:30},
  shark:{price:60,dur:0,equipment:true},
};
const TOOL_SHORT = {furm:'deShedding',hertzko:'Hertzko S',purple:'Purple L',safari:'Safari',rubber:'Rubber',dual:'Dual',shark:'Shark'};
const SPECIES = {
  cats:{win:500, base:{short:90,long:130}, pat:[65,100], sizes:['small','medium','large'], maxMats:3},
  dogs:{win:800, base:{short:120,long:190}, pat:[80,120], sizes:['medium','medium','large'], maxMats:4},

let G = null;
function noun(){ return LANG==='ru' ? (G.mode==='cats'?'кота':'пса') : (G.mode==='cats'?'cat':'dog'); }

function G_start(mode){
  G = { sp:SPECIES[mode], mode,
        day:1, money:40, fur:0, stam:100, floor:0,
        inv:{}, eq:null, cat:null, catsLeft:0, sessionFur:0,
        won:false, totalCats:0, baldIncidents:0 };
  showScreen('groomScreen');
  modal(T.gIntroT(T.gWinT[mode]), T.gIntro(mode, G.sp.win), [[T.gOpenShop, G_openShop]]);
  log(T.gAccepted(T.gWinT[mode]),'sys');
}
function G_hud(){
  hud('<span>'+T.day+' <b>'+G.day+'</b></span>'+
      '<span class="amber">'+T.caps+' <b>$'+G.money+'</b></span>'+
      '<span>'+T.fur+' <b>'+Math.round(G.fur)+' g</b> / '+G.sp.win+'</span>'+
      '<span>'+T.energy+' <b>'+Math.round(G.stam)+'</b></span>');
}
function G_newPet(){
  const sp = G.sp;
  const coat = Math.random()<.45?'long':'short';
  const size = pick(sp.sizes);
  const dense = Math.random()<.5;
  const temper = pick(['chill','normal','normal','skittish']);
  const base = sp.base[coat];
  const c = {
    name:pick(G.mode==='cats'?T.catNames:T.dogNames), coat, size, dense, temper,
    hue: pick(['#c98f4e','#9a9a9a','#4d4d4d','#d8d8d8','#b06a3a']),
    furMax: Math.round(base*(dense?1.5:1)*(size==='large'?1.25:size==='small'?.8:1)),
    trust: RI(40,70), patience: RI(sp.pat[0],sp.pat[1]), patMax:sp.pat[1],
    mats: coat==='long'?RI(0,sp.maxMats):0,
    overbrush:0, bald:false, fled:false, shine:false, done:false,
  };
  c.fur = c.furMax;
  return c;
}
function meterSet(id, val, max){
  const el = $('m'+id), wrap = $('m'+id+'Wrap');
  const pc = clamp(val/max*100,0,100);
  el.style.width = pc+'%';
  wrap.className = 'meter' + (pc<25?' bad':pc<55?' warn':'');
}
function G_render(){
  G_hud();
  $('floorFur').textContent = G.floor>0.5 ? T.floorFur(Math.round(G.floor)) : '';
  const c = G.cat;
  if(c && !c.done){
    $('catName').textContent = '▸ '+c.name.toUpperCase()+T.clientsLeft(G.catsLeft);
    $('cFur').textContent = Math.round(c.fur)+' / '+c.furMax+' g';
    $('cPat').textContent = Math.round(c.patience);
    $('cTrust').textContent = Math.round(c.trust);
    $('cCoat').textContent = T.coats[c.coat]+(c.dense?T.undercoat:'')+' / '+T.sizes[c.size];
    $('cTemp').textContent = T.temps[c.temper];
    $('cMats').textContent = c.mats>0? '⚠ '+c.mats : T.none;
    meterSet('Fur', c.fur, c.furMax); meterSet('Pat', c.patience, c.patMax); meterSet('Trust', c.trust, 100);
  } else {
    $('catName').textContent = T.empty;
    ['cFur','cPat','cTrust','cCoat','cTemp','cMats'].forEach(i=>$(i).textContent='—');
    meterSet('Fur',0,1);meterSet('Pat',0,1);meterSet('Trust',0,1);
  }
  const tl = $('toolList'); tl.innerHTML='';
  const ids = Object.keys(G.inv);
  if(!ids.length) tl.innerHTML = '<div class="tdur">'+T.noTools+'</div>';
  ids.forEach(id=>{
    const st = TOOL_STATS[id], inv = G.inv[id];
    const d = document.createElement('div');
    d.className = 'tool'+(G.eq===id?' eq':'');
    d.innerHTML = '<div class="tname">'+(G.eq===id?'▸ ':'')+T.tools[id][0]+(inv.fake?' <span style="color:var(--amber)">'+T.suspicious+'</span>':'')+'</div>'
      + '<div class="tdur">'+(st.equipment?T.equipment:T.durability+Math.max(0,Math.round(inv.dur))+'/'+inv.durMax)+'</div>';
    if(!st.equipment) d.onclick = ()=>{ G.eq=id; log(T.holding(T.tools[id][0]),'sys'); G_render(); };
    tl.appendChild(d);
  });
  const active = c && !c.done && !c.fled;
  $('bBrush').disabled = !active || !G.eq || G.stam<6;
  $('bBrush').textContent = G.eq? T.brush+TOOL_SHORT[G.eq] : T.brushNo;
  $('bHand').disabled = !active || G.stam<3;
  $('bTreat').disabled = !active || G.money<2;
  $('bVac').classList.toggle('hidden', !G.inv.shark);
  $('bVac').disabled = G.floor<1 || G.stam<10;
  $('bNext').disabled = !c || c.done;
  G_draw();
}
const cv = $('cv'), cx = cv.getContext('2d');
let shakeT = 0;
function G_draw(){
  if(MODE!=='cats' && MODE!=='dogs') return;
  cx.clearRect(0,0,96,80);
  cx.fillStyle = '#0f1a10'; cx.fillRect(0,66,96,14);
  if(G.floor>0.5){
    cx.fillStyle = '#8fd8a5';
    const n = Math.min(30, Math.round(G.floor/3)+3);
    for(let i=0;i<n;i++){ const x=(i*37)%90+3, y=67+((i*13)%9); cx.fillRect(x,y,2,1); }
  }
  const c = G.cat;
  if(!c || c.done) { cx.fillStyle='#1c4027'; cx.font='8px monospace'; cx.fillText(T.noClient, 26,40); return; }
  const isDog = G.mode==='dogs';
  const dx = shakeT>0 ? (Math.random()*2-1)*2 : 0;
  const fluff = c.fur/c.furMax;
  cx.fillStyle = 'rgba(191,255,208,.5)';
  const halo = Math.round(40*fluff*(c.coat==='long'?1.6:1));
  for(let i=0;i<halo;i++){
    const a = (i/halo)*Math.PI*2 + (i%3);
    const rx = 26+((i*7)%5), ry = 15+((i*5)%4);
    cx.fillRect(48+dx+Math.cos(a)*rx, 44+Math.sin(a)*ry, 1,1);
  }
  cx.fillStyle = c.hue;
  const w = (c.size==='large'?46:c.size==='small'?32:40)+(isDog?6:0), h = (c.size==='small'?18:22)+(isDog?3:0);
  const bx = 48-w/2+dx, by = 60-h;
  cx.fillRect(bx,by,w,h);
  cx.fillRect(bx+2,by-3,w-4,4);
  const tphase = Math.floor(Date.now()/400)%2;
  if(isDog){ cx.fillRect(bx+w, by-2+tphase*3, 4, 10); }
  else { cx.fillRect(bx+w, by+3+tphase*2, 10, 3); cx.fillRect(bx+w+8, by-1+tphase*3, 3, 6); }
  const hs = (c.size==='small'?14:16)+(isDog?2:0);
  cx.fillRect(bx-hs+4, by-hs+6, hs, hs);
  if(isDog){
    cx.fillRect(bx-hs-2, by-hs+13, 7, 5);
    cx.fillRect(bx-hs+3, by-hs+4, 3,8); cx.fillRect(bx+1, by-hs+4, 3,8);
  } else {
    cx.fillRect(bx-hs+4, by-hs+2, 4,4); cx.fillRect(bx, by-hs+2, 4,4);
  }
  cx.fillStyle = 'rgba(0,0,0,.28)';
  for(let i=0;i<4;i++) cx.fillRect(bx+6+i*9, by+1, 3, h-6);
  if(c.bald){ cx.fillStyle='#e8a4a4'; cx.fillRect(bx+w*.35, by+4, 7,5); cx.fillRect(bx+w*.62, by+9, 5,4); }
  cx.fillStyle = c.trust<25 ? '#ff5d4d' : '#0a0f0a';
  cx.fillRect(bx-hs+7, by-hs+11, 2,2); cx.fillRect(bx-hs+12, by-hs+11, 2,2);
  if(c.shine){ cx.fillStyle='#fff2c8'; [[bx+8,by-6],[bx+w-10,by-4],[bx+w/2,by-8]].forEach(([x,y])=>{cx.fillRect(x,y,1,1);cx.fillRect(x-1,y,3,1);cx.fillRect(x,y-1,1,3);}); }
  if(c.mats>0){ cx.fillStyle='#3a2a1a'; for(let i=0;i<c.mats;i++) cx.fillRect(bx+8+i*11, by+h-7, 4,4); }
  cx.fillStyle = '#5dff7e'; cx.font='7px monospace';
  cx.fillText(c.trust>70?(isDog?'wag wag':'purr...'):c.trust<25?(isDog?'GRRR!':'HISS!'):'', bx-hs+2, by-hs+2);
  if(shakeT>0) shakeT--;
}
setInterval(()=>{ if(MODE==='cats'||MODE==='dogs') G_draw(); }, 400);

function G_gainFur(g){
  G.fur += g; G.sessionFur += g;
  if(!G.won && G.fur>=G.sp.win) G_win();
}
function G_spendStam(n){ G.stam = Math.max(0, G.stam-n); if(G.stam<3) log(T.fumes,'warn'); }
function G_patHit(c, n){
  const mult = c.temper==='skittish'?1.5:c.temper==='chill'?0.7:1;
  c.patience = Math.max(0, c.patience - n*mult);
}
function G_checkSession(c){
  if(c.trust<10 && Math.random()<.6){
    c.fled = true; log(G.mode==='dogs'?T.fledDog(c.name):T.fledCat(c.name),'bad');
    G_endSession(false); return true;
  }
  if(c.patience<=0){ log(T.outPatience(c.name),'warn'); G_endSession(true); return true; }
  return false;
}
function G_endSession(paid){
  const c = G.cat; if(!c || c.done) return;
  c.done = true;
  if(paid && G.sessionFur>0.5){
    let pay = Math.round(G.sessionFur*0.12);
    let note = [];
    if(c.bald){ pay = Math.max(0,pay-5); note.push(T.fineBald); G.baldIncidents++; }
    else if(c.trust>=70){ pay += 5; note.push(T.tip); }
    if(c.shine){ pay += 4; note.push(T.shineBonus); }
    if(G.sessionFur>=60) log(T.marvel(noun()),'good');
    G.money += pay;
    log(T.sessionDone(c.name, Math.round(G.sessionFur), pay, note.length?' ('+note.join(', ')+')':''),'good');
    if(c.fur<c.furMax*0.5) log(T.lighter(c.name),'sys');
  } else if(paid){
    log(T.shrug,'warn');
  }
  G.totalCats++; G.sessionFur = 0;
  G_render();
}
function G_nextPet(){
  if(G.catsLeft<=0){ log(T.queueEmpty,'sys'); return; }
  if(G.cat && !G.cat.done) G_endSession(true);
  G.catsLeft--; G.cat = G_newPet(); G.sessionFur = 0;
  const c = G.cat;
  log(T.client(c.name, T.coats[c.coat], c.dense, T.sizes[c.size], T.temps[c.temper], c.mats),'sys');
  G_render();
}
function G_brush(){
  const c = G.cat, id = G.eq;
  if(!c || c.done || !id) return;
  const inv = G.inv[id];
  shakeT = 3;
  let g = 0, stam = 6;
  const fakeMult = inv.fake ? 0.5 : 1;

  if(id==='furm'){
    g = R(12,20) * (c.dense?1.6:1);
    if(c.coat==='long' && c.mats>0){ g*=0.6; log(T.matsBlock,'warn'); }
    c.overbrush++;
    c.trust -= c.temper==='chill'?2:4;
    if(c.overbrush>3 && Math.random() < (c.overbrush-3)*0.12){
      c.bald = true; c.trust -= 30; g*=0.5;
      log(T.baldSpot(c.name),'bad');
    }
    if(Math.random()<.25){ const s=g*.3; g-=s; G.floor += s; log(T.static(Math.round(s)),'warn'); }
    if(Math.random()<.15) log(T.eject,'sys');
  }
  else if(id==='hertzko'){
    g = R(8,12);
    stam = 9;
    if(c.size==='small'){ g*=0.7; if(Math.random()<.4) log(T.oversized(noun()),'warn'); }
    c.trust -= 1;
    if(Math.random()<.3) log(T.selfClean,'sys');
    if(Math.random()<.2) log(T.holdButton,'warn');
  }
  else if(id==='purple'){
    if(c.size==='small'){ g = R(3,5); if(Math.random()<.5) log(T.tooBig(noun()),'warn'); }
    else if(c.coat==='long'){
      g = R(14,18);
      if(c.mats>0){ c.mats--; g+=10; c.trust+=2; log(T.matOut(c.name),'good'); }
    } else { g = R(3,5); if(Math.random()<.5) log(T.gaps,'warn'); }
    c.trust -= 1;
    if(Math.random()<.03){ inv.dur = 0; log(T.handleCrack,'bad'); }
  }
  else if(id==='safari'){
    if(Math.random()<.25){ g = R(0.5,1.5); log(T.slipThrough,'warn'); }
    else g = R(7,10);
    c.trust += 2;
    if(Math.random()<.25) log(T.delighted(c.name),'good');
  }
  else if(id==='rubber'){
    if(c.coat==='short' && Math.random()<.3){ g = 0; log(T.noGrab,'warn'); }
    else g = R(4,6);
    c.trust += 3;
    const s = g*0.5; g -= s; G.floor += s;
    if(s>0.5) log(T.flies(Math.round(s)),'warn');
    if(c.temper==='skittish') log(T.gentle(noun()),'sys');
  }
  else if(id==='dual'){
    g = R(2,9);
    c.shine = true; c.trust += 1;
    if(Math.random()<.3) log(T.mystery(Math.round(g)),'sys');
    if(Math.random()<.05){ inv.dur -= 10; log(T.pinOut,'bad'); }
    if(Math.random()<.4) log(T.shine(c.name),'good');
  }

  g = Math.min(g*fakeMult, c.fur);
  if(inv.fake && Math.random()<.3) log(T.counterfeit,'warn');
  c.fur -= g; G_gainFur(g);
  inv.dur -= inv.fake?2.5:1;
  c.trust = clamp(c.trust,0,100);
  G_patHit(c, id==='rubber'?4:7);
  G_spendStam(stam);
  if(g>0.5) log(T.brushed(Math.round(g), Math.round(c.fur)),'');
  if(inv.dur<=0 && !TOOL_STATS[id].equipment){
    log(T.broke(T.tools[id][0]),'bad');
    delete G.inv[id]; if(G.eq===id) G.eq = Object.keys(G.inv).find(k=>!TOOL_STATS[k].equipment)||null;
  }
  if(!G_checkSession(c)) G_render();
}
function G_hand(){
  const c = G.cat; if(!c||c.done) return;
  shakeT = 1;
  c.trust = clamp(c.trust+6,0,100);
  const g = Math.min(R(1,2.5), c.fur);
  c.fur -= g; G_gainFur(g);
  G_patHit(c,3); G_spendStam(3);
  log(T.petted(g.toFixed(1)),'');
  if(!G_checkSession(c)) G_render();
}
function G_treat(){
  const c = G.cat; if(!c||c.done||G.money<2) return;
  G.money -= 2; c.trust = clamp(c.trust+14,0,100); c.patience = Math.min(c.patMax, c.patience+12);
  log(T.treat(c.name),'good');
  G_render();
}
function G_vacuum(){
  if(!G.inv.shark || G.floor<1) return;
  const g = G.floor; G.floor = 0; G_gainFur(g);
  G_spendStam(10);
  log(T.vacuumed(Math.round(g)),'good');
  const c = G.cat;
  if(c && !c.done && c.temper==='skittish'){ G_patHit(c,15); c.trust-=8; log(T.roar(noun()),'warn'); if(G_checkSession(c)) return; }
  G_render();
}
function G_openShop(){
  showScreen('groomScreen');
  modal(T.shopT, T.shopHead(G.money), [[T.startDay, G_startDay]]);
  const list = $('shopList');
  Object.keys(TOOL_STATS).forEach(id=>{
    const st = TOOL_STATS[id];
    if(G.inv[id] && st.equipment) return;
    const row = document.createElement('div'); row.className='shopitem';
    row.innerHTML = '<div><div class="sname">'+T.tools[id][0]+'</div><div class="sdesc">'+T.tools[id][1]+'</div></div>';
    const btn = document.createElement('button');
    btn.className='amber'; btn.innerHTML='$'+st.price;
    btn.disabled = G.money<st.price || !!(G.inv[id]&&!st.equipment&&G.inv[id].dur>0);
    btn.onclick = (e)=>{ e.stopPropagation(); G_buy(id, st.price, false); G_refreshShopMoney(); btn.disabled = true; };
    const pr = document.createElement('div'); pr.className='price'; pr.appendChild(btn);
    row.appendChild(pr); list.appendChild(row);
  });
  if(G.day>1 && Math.random()<.5 && !G.inv.furm){
    const row = document.createElement('div'); row.className='shopitem fake';
    row.innerHTML = '<div><div class="sname">'+T.fakeName+'</div><div class="sdesc">'+T.fakeDesc+'</div></div>';
    const btn = document.createElement('button'); btn.className='amber'; btn.innerHTML='$19';
    btn.disabled = G.money<19;
    btn.onclick = (e)=>{ e.stopPropagation(); G_buy('furm', 19, Math.random()<.6); G_refreshShopMoney(); btn.disabled = true; };
    const pr = document.createElement('div'); pr.className='price'; pr.appendChild(btn);
    row.appendChild(pr); list.appendChild(row);
  }
}
function G_refreshShopMoney(){
  const el = document.querySelector('#mBody .win'); if(el) el.textContent = '$'+G.money;
}
function G_buy(id, price, fake){
  if(G.money<price) return;
  G.money -= price;
  const st = TOOL_STATS[id];
  let dur = st.dur;
  if(id==='safari' && Math.random()<.1){ dur = 20; log(T.safariDmg,'warn'); }
  G.inv[id] = {dur, durMax:st.dur, fake:!!fake};
  if(!st.equipment && !G.eq) G.eq = id;
  log(T.bought(T.tools[id][0], price),'sys');

function G_startDay(){

}
function G_endDay(){
  if(G.cat && !G.cat.done) G_endSession(true);

}
function G_win(){

// ================= VACUUM RUN v2 =================
const VW=10, VH=7, VC=20; // 200x140 canvas, 20px cells
const vcv = $('vcv'), vx = vcv.getContext('2d');
let V = null;
// furniture: sofa (2 cells), table, plant — impassable
const FURN = { sofa:[[2,1],[3,1]], table:[[6,3]], plant:[[8,1]] };
const BLOCKED = new Set([].concat(FURN.sofa,FURN.table,FURN.plant).map(c=>c[0]+','+c[1]));
function V_start(){
  V = { vac:{x:0,y:0}, battery:100, got:0, target:140, fur:{}, moving:false,
        cat:{x:VW-2,y:VH-2,awake:0}, over:false, hover:null };
  let placed=0;
  while(placed<15){
    const x=RI(0,VW-1), y=RI(0,VH-1), k=x+','+y;
    if((x===0&&y===0)||V.fur[k]||BLOCKED.has(k)||(x===V.cat.x&&y===V.cat.y)) continue;
    V.fur[k]=RI(4,16); placed++;
  }
  // bonus tufts hugging the sofa edge
  [[2,2],[3,2],[4,1]].forEach(([x,y])=>{ const k=x+','+y; if(!BLOCKED.has(k)) V.fur[k]=(V.fur[k]||0)+RI(8,14); });
  showScreen('vacScreen');
  modal(T.vTitle, T.vIntro(V.target), [[T.vPowerOn, ()=>{ V_render(); log(T.vStarted,'sys'); }]]);
}
function V_render(){
  hud('<span>'+T.kBat+' <b>'+Math.max(0,Math.round(V.battery))+'%</b></span>'+
      '<span>'+T.kGot+' <b>'+Math.round(V.got)+' g</b> / '+V.target+'</span>');
  $('vBat').textContent = Math.max(0,Math.round(V.battery))+'%';
  $('vGot').textContent = Math.round(V.got)+' g / '+V.target;
  const bw=$('mBat'); bw.style.width=clamp(V.battery,0,100)+'%';
  $('mBatWrap').className='meter'+(V.battery<25?' bad':V.battery<55?' warn':'');
  $('mGot').style.width=clamp(V.got/V.target*100,0,100)+'%';
  $('mGotWrap').className='meter';
  V_draw();
}
function V_draw(){
  // wooden floor
  for(let y=0;y<VH;y++) for(let x=0;x<VW;x++){
    vx.fillStyle = (y%2)? '#191307':'#150f06';
    vx.fillRect(x*VC, y*VC, VC, VC);
    vx.fillStyle = 'rgba(0,0,0,.25)';
    vx.fillRect(x*VC, y*VC+VC-1, VC, 1); // plank seams
    if((x*3+y)%4===0){ vx.fillStyle='rgba(255,255,255,.03)'; vx.fillRect(x*VC+3, y*VC+RI(2,14), 6,1); }
  }
  // rug
  vx.fillStyle='#12241a'; vx.fillRect(3*VC, 3*VC, 4*VC, 3*VC);
  vx.strokeStyle='#1c4027'; vx.lineWidth=2; vx.strokeRect(3*VC+3, 3*VC+3, 4*VC-6, 3*VC-6);
  // dock
  vx.fillStyle='#1c4027'; vx.fillRect(1,1,VC-2,VC-2);
  vx.fillStyle='#5dff7e'; vx.fillRect(7,4,3,6); vx.fillRect(10,8,3,6); // lightning
  // hover highlight
  if(V.hover && !V.moving && !V.over){
    vx.fillStyle='rgba(93,255,126,.12)';
    vx.fillRect(V.hover.x*VC, V.hover.y*VC, VC, VC);
    vx.strokeStyle='rgba(93,255,126,.5)'; vx.lineWidth=1;
    vx.strokeRect(V.hover.x*VC+.5, V.hover.y*VC+.5, VC-1, VC-1);
    if(V.hover.cost!=null){
      vx.fillStyle='#ffb54d'; vx.font='9px monospace';
      vx.fillText('-'+V.hover.cost+'%', V.hover.x*VC+2, V.hover.y*VC+9);
    }
  }
  // fur tufts
  Object.keys(V.fur).forEach(k=>{
    const [x,y]=k.split(',').map(Number), g=V.fur[k];
    const cxp=x*VC+VC/2, cyp=y*VC+VC/2;
    const r = clamp(2+g/3, 3, 9);
    vx.fillStyle='rgba(0,0,0,.3)';
    vx.beginPath(); vx.ellipse(cxp+1, cyp+2, r, r*0.6, 0, 0, 7); vx.fill();
    vx.fillStyle='#8fd8a5';
    for(let i=0;i<Math.round(r*2.2);i++){
      const a=i*2.399, rr=r*Math.sqrt((i%7)/7);
      vx.fillRect(cxp+Math.cos(a)*rr, cyp+Math.sin(a)*rr*0.7, 2,2);
    }
    vx.fillStyle='#cfeedd';
    vx.fillRect(cxp-1, cyp-1, 2,2);
  });
  // sofa
  vx.fillStyle='#24301f'; vx.fillRect(2*VC, 1*VC-6, 2*VC, VC+6);
  vx.fillStyle='#2e3d28'; vx.fillRect(2*VC+2, 1*VC-2, 2*VC-4, VC-6);
  vx.fillStyle='#1a241a'; vx.fillRect(2*VC, 1*VC+VC-4, 4,4); vx.fillRect(4*VC-4, 1*VC+VC-4, 4,4);
  // table
  vx.fillStyle='#3a2c14'; vx.fillRect(6*VC+2, 3*VC+2, VC-4, VC-6);
  vx.fillStyle='#241a0a'; vx.fillRect(6*VC+3, 3*VC+VC-6, 3,4); vx.fillRect(7*VC-6, 3*VC+VC-6, 3,4);
  // plant
  vx.fillStyle='#5a3018'; vx.fillRect(8*VC+6, 1*VC+11, 8, 7);
  vx.fillStyle='#2f7a45';
  vx.fillRect(8*VC+8, 1*VC+3, 4,9); vx.fillRect(8*VC+4, 1*VC+6, 4,5); vx.fillRect(8*VC+12, 1*VC+6, 4,5);
  // cat (sleeping curl or awake)
  const ct=V.cat, ccx=ct.x*VC+VC/2, ccy=ct.y*VC+VC/2;
  vx.fillStyle='#c98f4e';
  vx.beginPath(); vx.ellipse(ccx, ccy+2, 8, 5, 0, 0, 7); vx.fill();
  vx.fillRect(ccx-8, ccy-5, 7, 7); // head
  vx.fillRect(ccx-8, ccy-7, 2,2); vx.fillRect(ccx-3, ccy-7, 2,2); // ears
  vx.fillStyle='#a8743c'; vx.fillRect(ccx+2, ccy-1, 7,2); // tail curl
  if(ct.awake>0){
    vx.fillStyle='#ff5d4d'; vx.fillRect(ccx-7, ccy-3, 2,2); vx.fillRect(ccx-4, ccy-3, 2,2);
    vx.fillStyle='#ffb54d'; vx.font='8px monospace'; vx.fillText('!!', ccx-2, ccy-9);
  } else {
    vx.fillStyle='#0a0f0a'; vx.fillRect(ccx-7, ccy-2, 3,1); vx.fillRect(ccx-3, ccy-2, 2,1);
    vx.fillStyle='#5dff7e'; vx.font='7px monospace';
    if(Math.floor(Date.now()/700)%2) vx.fillText('z', ccx+2, ccy-8);
    else vx.fillText('zZ', ccx+1, ccy-7);
  }
  // vacuum robot
  const vp=V.vac, vpx=vp.x*VC+VC/2, vpy=vp.y*VC+VC/2;
  if(V.moving){ vx.fillStyle='rgba(255,181,77,.25)'; vx.beginPath(); vx.arc(vpx,vpy,11,0,7); vx.fill(); }
  vx.fillStyle='rgba(0,0,0,.4)'; vx.beginPath(); vx.ellipse(vpx+1,vpy+3,8,5,0,0,7); vx.fill();
  vx.fillStyle= V.battery>25? '#ffb54d' : '#ff5d4d';
  vx.beginPath(); vx.arc(vpx,vpy,8,0,7); vx.fill();
  vx.fillStyle='#8a6226'; vx.beginPath(); vx.arc(vpx,vpy,5,0,7); vx.fill();
  vx.fillStyle='#0a0f0a'; vx.beginPath(); vx.arc(vpx,vpy,2,0,7); vx.fill();
  vx.fillStyle='#fff2c8'; vx.fillRect(vpx-1,vpy-8,2,2); // sensor light
}
setInterval(()=>{ if(MODE==='vacuum'&&V&&!V.over) V_draw(); }, 500);
function V_bfs(from, to){
  if(BLOCKED.has(to.x+','+to.y)) return null;
  const q=[[from.x,from.y]], prev={}, seen=new Set([from.x+','+from.y]);
  while(q.length){
    const [x,y]=q.shift();
    if(x===to.x&&y===to.y){
      const path=[]; let k=x+','+y;
      while(prev[k]){ const [px,py]=k.split(',').map(Number); path.unshift([px,py]); k=prev[k]; }
      return path;
    }
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
      const nx=x+dx, ny=y+dy, nk=nx+','+ny;
      if(nx<0||ny<0||nx>=VW||ny>=VH||seen.has(nk)||BLOCKED.has(nk)) return;
      seen.add(nk); prev[nk]=x+','+y; q.push([nx,ny]);
    });
  }
  return null;
}
function V_cell(e){
  const r = vcv.getBoundingClientRect();
  return { x: clamp(Math.floor((e.clientX-r.left)/r.width*VW),0,VW-1),
           y: clamp(Math.floor((e.clientY-r.top)/r.height*VH),0,VH-1) };
}
vcv.addEventListener('mousemove', e=>{
  if(MODE!=='vacuum'||!V||V.over||V.moving) return;
  const c = V_cell(e);
  const path = V_bfs(V.vac, c);
  V.hover = {x:c.x, y:c.y, cost: path? path.length : null};
});
vcv.addEventListener('mouseleave', ()=>{ if(V) V.hover=null; });
vcv.addEventListener('click', e=>{
  if(MODE!=='vacuum' || !V || V.over || V.moving) return;
  const c = V_cell(e);
  const path = V_bfs(V.vac, c);
  if(!path || !path.length) return;
  V.moving = true; V.hover = null;
  const step = ()=>{
    if(V.over){ V.moving=false; return; }
    const nxt = path.shift();
    if(!nxt || V.battery<=0){ V.moving=false; V_finishCheck(); return; }
    V.battery -= 1;
    V.vac = {x:nxt[0], y:nxt[1]};
    const k = nxt[0]+','+nxt[1];
    if(V.fur[k]){
      const g=V.fur[k]; delete V.fur[k];
      if(g>=12 && Math.random()<.2){ V.battery-=5; log(T.vJam(g),'warn'); }
      V.got += g;
      log(T.vSucked(g),'');
    }
    if(Math.abs(nxt[0]-V.cat.x)<=1 && Math.abs(nxt[1]-V.cat.y)<=1 && V.cat.awake<=0){
      V.cat.awake = 6;
      let nx, ny, guard=0;
      do{ nx=RI(0,VW-1); ny=RI(0,VH-1); }while((BLOCKED.has(nx+','+ny) || (Math.abs(nx-nxt[0])<3&&Math.abs(ny-nxt[1])<3)) && guard++<50);
      let drops=3;
      while(drops-->0){
        let dx,dy,g2=0;
        do{ dx=RI(0,VW-1); dy=RI(0,VH-1); }while(BLOCKED.has(dx+','+dy)&&g2++<30);
        const dk=dx+','+dy;
        V.fur[dk]=(V.fur[dk]||0)+RI(1,3);
      }
      V.cat.x=nx; V.cat.y=ny;
      log(T.vPanic,'warn');
    }
    if(V.cat.awake>0) V.cat.awake--;
    V_render();
    if(V.got>=V.target || V.battery<=0){ V.moving=false; V_finishCheck(); return; }
    setTimeout(step, 110);
  };
  step();
});
function V_finishCheck(){
  V_render();
  if(V.over) return;
  if(V.got>=V.target){
    V.over=true;
    contractComplete(T.vTitleShort, T.vWin(Math.round(V.got), Math.max(0,Math.round(V.battery))));
  } else if(V.battery<=0){
    V.over=true;
    contractFailed(T.vTitleShort, T.vLose(Math.round(V.got), V.target), V_start);
  }
}
$('vGiveUp').onclick = ()=>{ if(V && !V.over){ V.over=true; contractFailed(T.vTitleShort, T.vAbandon(Math.round(V.got)), V_start);} };

function L_hud(){

function L_render(){

    $('lFresh'+i).disabled = L.over || L.litter<=0;

function L_drawBox(i, b){
  const c=$('lc'+i); if(!c) return;
  const g=c.getContext('2d');
  g.clearRect(0,0,66,40);
  // box
  g.fillStyle='#2a3540'; g.fillRect(4,12,58,24);
  g.fillStyle='#1a222a'; g.fillRect(7,15,52,18);
  // litter
  g.fillStyle='#9a9078';
  const level = 15+18-Math.round(6);
  g.fillRect(7, 21, 52, 12);
  g.fillStyle='#b0a68c';
  for(let k=0;k<40;k++) g.fillRect(8+((k*7)%50), 22+((k*3)%10), 1,1);
  // clumps proportional to load
  const clumps = Math.round(clamp(b.load,0,100)/9);
  g.fillStyle='#4a3a24';
  for(let k=0;k<clumps;k++) g.fillRect(9+((k*11)%48), 23+((k*5)%9), 3,2);
  // stink waves
  if(b.load>=50){
    g.fillStyle= b.load>=80? '#ff5d4d':'#ffb54d';
    const ph=Math.floor(Date.now()/400)%2;
    [[16,8],[33,5],[50,8]].forEach(([wx,wy],j)=>{
      g.fillRect(wx, wy-(ph?1:0)+j%2, 1,3); g.fillRect(wx+2, wy-3-(ph?0:1)+j%2, 1,3);
    });
  }
  // cat used marker
  if(b.lastUsed){
    g.fillStyle='#c98f4e'; g.fillRect(48,2,10,7); g.fillRect(48,0,2,2); g.fillRect(55,0,2,2);
    g.fillStyle='#0a0f0a'; g.fillRect(50,4,1,1); g.fillRect(53,4,1,1);
  }
}
setInterval(()=>{ if(MODE==='litter'&&L&&!L.over) L.boxes.forEach((b,i)=>L_drawBox(i,b)); }, 400);
function L_act(kind, i){
  if(L.over) return;
  if(kind==='scoop'){ L.boxes[i].load=Math.max(0,L.boxes[i].load-40); log(T.lScooped(i),''); }
  else if(kind==='fresh'){ L.litter--; L.boxes[i].load=0; L.odor=Math.max(0,L.odor-8); log(T.lFreshed(i),'good'); }
  else if(kind==='vent'){ L.vents--; L.odor=Math.max(0,L.odor-15); log(T.lVented,'good'); }
  else log(T.lNothing,'sys');
  L_catsTurn();
}
$('lVent').onclick=()=>L_act('vent');
$('lWait').onclick=()=>L_act('wait');
function L_catsTurn(){
  log(T.lCatsTurn,'sys');
  L.boxes.forEach(b=>b.lastUsed=false);
  const uses=RI(1,2);
  for(let u=0;u<uses;u++){
    const i=RI(0,2), box=L.boxes[i], cat=pick(T.catNames);
    if(box.load>80){
      L.odor+=8;
      log(T.lBypass(cat,i),'bad');
    } else {
      box.load+=RI(12,22); box.lastUsed=true;
      if(Math.random()<.35) log(T.lUsed(cat,i),'sys');
    }
  }
  L.odor += L.boxes.reduce((s,b)=> s + (b.load>50 ? (b.load-50)/30 : 0), 0.4);
  L.odor = clamp(L.odor,0,100);
  if(Math.random()<.1){ L.odor+=6; log(T.lStomach,'warn'); }
  if(L.turn>=L.maxTurn){
    L.over=true; L_render();
    if(L.odor<30) contractComplete(T.lWinT, T.lWin(Math.round(L.odor)));
    else contractFailed(T.lWinT, T.lLose(Math.round(L.odor)), L_start);
    return;
  }
  L.turn++;
  log(T.lTurnBegins(L.turn),'sys');
  L_render();
}

// ================= STAIN RESPONSE v2 =================
const tcv = $('tcv'), tx2 = tcv.getContext('2d');
let ST = null;
const STYPE_KEYS=['mud','cola','hair','mystery'];
const STYPE_HUE={mud:'#7a5a34', cola:'#8a3a2a', hair:'#6a7a3a', mystery:'#3a6a7a'};
function T_start(){
  ST = { round:1, maxRound:12, ap:2, stains:[], sel:null, over:false, cleaned:0, nextId:1 };
  T_spawn(); T_spawn();
  showScreen('stainScreen');
  modal(T.stTitle, T.stIntro, [[T.stTowels, ()=>{ T_render(); log(T.stStarted,'sys'); }]]);
}
function T_spawn(){
  const key=pick(STYPE_KEYS);
  ST.stains.push({ id:ST.nextId++, key, size:R(9,16), fresh:2, state:'fresh',
                  enzyme:0, x:R(25,175), y:R(20,120) });
}
function T_hud(){
  const pips = '●'.repeat(ST.ap)+'○'.repeat(2-ST.ap);
  hud('<span>'+T.round+' <b>'+ST.round+'</b> / '+ST.maxRound+'</span>'+
      '<span class="amber">'+T.actionsLeft+' <b>'+pips+'</b></span>'+
      '<span>'+T.stainsN+' <b>'+ST.stains.length+'</b></span>');
}
function T_render(){
  T_hud();
  // carpet
  for(let y=0;y<14;y++) for(let x=0;x<20;x++){
    tx2.fillStyle=(x+y)%2?'#15220f':'#121d0d';
    tx2.fillRect(x*10,y*10,10,10);
  }
  tx2.strokeStyle='#1c4027'; tx2.lineWidth=2; tx2.strokeRect(4,4,192,132);
  ST.stains.forEach(s=>{
    const r=clamp(s.size/2,3,16);
    // blob
    tx2.fillStyle=STYPE_HUE[s.key];
    for(let i=0;i<Math.round(r*3);i++){
      const a=i*2.399, rr=r*Math.sqrt((i%9)/9);
      tx2.fillRect(s.x+Math.cos(a)*rr, s.y+Math.sin(a)*rr*0.75, 2.5,2.5);
    }
    tx2.fillRect(s.x-1.5,s.y-1.5,3,3);
    // state ring
    let ring = s.enzyme>0 ? '#6fd8ff' : s.state==='fresh' ? '#5dff7e' : '#ff5d4d';
    const pulse = s.state==='fresh' && s.enzyme===0 && Math.floor(Date.now()/400)%2;
    tx2.strokeStyle=ring; tx2.lineWidth = pulse?2:1;
    tx2.beginPath(); tx2.arc(s.x, s.y, r+4, 0, 7); tx2.stroke();
    // countdown badge
    let badge = s.enzyme>0 ? String(s.enzyme) : s.state==='fresh' ? String(s.fresh) : '';
    if(badge){
      tx2.fillStyle='#0a0f0a'; tx2.fillRect(s.x+r, s.y-r-8, 9, 9);
      tx2.strokeStyle=ring; tx2.lineWidth=1; tx2.strokeRect(s.x+r+.5, s.y-r-7.5, 8, 8);
      tx2.fillStyle=ring; tx2.font='7px monospace'; tx2.fillText(badge, s.x+r+2.5, s.y-r-1);
    }
    // enzyme bubbles
    if(s.enzyme>0){
      tx2.fillStyle='#6fd8ff';
      const ph=Math.floor(Date.now()/300)%3;
      tx2.fillRect(s.x-4, s.y-r-2+ph, 2,2); tx2.fillRect(s.x+3, s.y-r-4+((ph+1)%3), 2,2);
    }
    // selection
    if(ST.sel===s.id){
      tx2.strokeStyle='#ffb54d'; tx2.lineWidth=1.5;
      tx2.strokeRect(s.x-r-7, s.y-r-7, r*2+14, r*2+14);
    }
  });
  if(!ST.stains.length){
    tx2.fillStyle='#2f7a45'; tx2.font='10px monospace';
    tx2.fillText(T.stClean, 40, 70);
  }
  // selected info panel
  const sel = ST.stains.find(s=>s.id===ST.sel);
  const info = $('stInfo');
  if(!sel){
    info.innerHTML = '<span style="color:var(--phos-dim)">'+T.stNone+'</span>';
  } else {
    let badge, rec;
    if(sel.enzyme>0){ badge='<span class="badge b-enz">'+T.stEnz(sel.enzyme)+'</span>'; rec=T.recEnz(sel.enzyme); }
    else if(sel.state==='fresh'){ badge='<span class="badge b-fresh">'+T.stFresh+'</span> <span style="color:var(--phos-dim)">('+T.stFreshIn(sel.fresh)+')</span>'; rec=T.recFresh; }
    else { badge='<span class="badge b-set">'+T.stSet+'</span>'; rec=T.recSet; }
    info.innerHTML = '<b style="color:'+STYPE_HUE[sel.key]+'">■</b> <b>'+T.stTypes[sel.key]+'</b><br>'+
      badge+'<br>'+T.stSize+': '+Math.round(sel.size)+'<br>'+
      '<span class="rec">'+T.stRec+rec+'</span>';
  }
  $('tBlot').disabled = ST.over || !sel || ST.ap<1 || sel.state!=='fresh' || sel.enzyme>0;
  $('tEnzyme').disabled = ST.over || !sel || ST.ap<1 || sel.enzyme>0;
  $('tScrub').disabled = ST.over || !sel || ST.ap<1;
  $('tEnd').disabled = ST.over;
}
setInterval(()=>{ if(MODE==='stains'&&ST&&!ST.over) T_render(); }, 400);
tcv.addEventListener('click', e=>{
  if(MODE!=='stains'||!ST||ST.over) return;
  const r = tcv.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*200, my=(e.clientY-r.top)/r.height*140;
  let best=null, bd=1e9;
  ST.stains.forEach(s=>{
    const d=Math.hypot(s.x-mx, s.y-my);
    if(d<bd && d < clamp(s.size/2,3,16)+9){ bd=d; best=s; }
  });
  if(best){ ST.sel=best.id; T_render(); }
});
function T_remove(s, how){
  ST.stains = ST.stains.filter(x=>x.id!==s.id);
  if(ST.sel===s.id) ST.sel = ST.stains.length? ST.stains[0].id : null;
  ST.cleaned++;
  log(T.stGone(T.stTypes[s.key], how),'good');
}
$('tBlot').onclick=()=>{
  const s=ST.stains.find(x=>x.id===ST.sel); if(!s||ST.ap<1) return;
  ST.ap--;
  s.size*=0.45;
  if(s.size<4) T_remove(s,T.howBlot);
  else log(T.stBlotted(Math.round(s.size)),'');
  T_render();
};
$('tEnzyme').onclick=()=>{
  const s=ST.stains.find(x=>x.id===ST.sel); if(!s||ST.ap<1) return;
  ST.ap--;
  s.enzyme=2;
  log(T.stEnzApplied(T.stTypes[s.key]),'sys');
  T_render();
};
$('tScrub').onclick=()=>{
  const s=ST.stains.find(x=>x.id===ST.sel); if(!s||ST.ap<1) return;
  ST.ap--;
  if(s.enzyme>0){ s.enzyme=0; log(T.stScrubEnz,'bad'); }
  else if(s.state==='fresh'){ s.size*=0.7; if(s.size<4) T_remove(s,T.howScrub); else log(T.stScrubFresh(Math.round(s.size)),''); }
  else { s.size*=1.4; log(T.stScrubSet(Math.round(s.size)),'bad'); }
  T_render();
};
$('tEnd').onclick=()=>{
  if(ST.over) return;
  ST.stains.slice().forEach(s=>{
    if(s.enzyme>0){
      s.enzyme--;
      if(s.enzyme===0) T_remove(s,T.howEnzyme);
    } else if(s.state==='fresh'){
      s.fresh--;
      if(s.fresh<=0){ s.state='set-in'; log(T.stSetIn(T.stTypes[s.key]),'warn'); }
    }
  });
  ST.round++;
  if(ST.round>ST.maxRound){
    ST.over=true; T_render();
    if(ST.stains.length<=1) contractComplete(T.stWinT, T.stWin(ST.stains.length, ST.cleaned));
    else contractFailed(T.stWinT, T.stLose(ST.stains.length, ST.cleaned), T_start);
    return;
  }
  ST.ap=2;
  if(Math.random()<.65){ T_spawn(); log(T.stNew(T.stTypes[ST.stains[ST.stains.length-1].key]),'warn'); }
  log(T.stRound(ST.round),'sys');
  T_render();
};

  const m = new URLSearchParams(location.search).get('mode');
  if(m && ['cats','dogs','vacuum','litter','stains'].includes(m)) startMode(m);
  else contracts();
})();
